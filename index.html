                ];
              }
            },

            // スライダー値の変換後の値のゲッター（変換は各スライダーパラメータで定義）
            get basicSpreadProbability() {
              return basicInfoSlider.into;
            },
            get misinfoProbability() {
              return misInfoSlider.into;
            },
            get correctionSpreadProbability() {
              return misInfoSlider.into;
            },
            get correctionChance() {
              return correctChanceSlider.into;
            },
            get correctionDelaySec() {
              return trueInfoDelaySlider.into;
            },

            sourceData: {
              plain: {
                /** @type {number[]} */
                ids: [],
                /** @type {string[]} */
                colors: [],
              },
              false: {
                /** @type {number[]} */
                ids: [],
                /** @type {string[]} */
                colors: [],
              },
              true: {
                /** @type {number[]} */
                ids: [],
                /** @type {string[]} */
                colors: [],
              },
              /** @param {Info} kind */
              count(kind) {
                return this[kind].ids.length;
              },
              clearAll() {
                this.clear("plain");
                this.clear("false");
                this.clear("true");
              },
              /** @param {Info} kind */
              clear(kind) {
                this[kind].ids.forEach((id) => {
                  _nodes[id].source = undefined;
                });
                this[kind].ids = [];
                this[kind].colors = [];
                writeLog(`${SOURCE_PROPS[kind].name}をリセットしました`);
              },
              /**
               * @param {Info} kind
               * @param {number} id
               */
              push(kind, id) {
                this[kind].ids.push(id);
                _nodes[id].source = kind;
                this[kind].colors = newColorMap(
                  COLORS[kind].hsl,
                  this[kind].ids.length,
                );
                writeLog(`${SOURCE_PROPS[kind].name}を1つ追加しました`);
              },
              /** @param {Info} kind */
              pop(kind) {
                const id = this[kind].ids.pop();
                _nodes[id].source = undefined;
                this[kind].colors = newColorMap(
                  COLORS[kind].hsl,
                  this[kind].ids.length,
                );
                writeLog(
                  `ノード${id}の${SOURCE_PROPS[kind].name}を解除しました`,
                );
              },
              /**
               * @param {Info} kind
               * @param {number} id
               */
              remove(kind, id) {
                this[kind] = this[kind].filter((i) => i === id);
                _nodes[id].source = undefined;
                this[kind].colors = newColorMap(
                  COLORS[kind].hsl,
                  this[kind].ids.length,
                );
                writeLog(
                  `ノード${id}の${SOURCE_PROPS[kind].name}を解除しました`,
                );
              },
            },

            get availableSources() {
              return INFOS_BY_SOURCE[this.scenario].map(
                (/** @type {Info} */ kind) => {
                  /** @type {string} */
                  const label =
                    SOURCE_PROPS[kind]?.longName ?? SOURCE_PROPS[kind].name;
                  const count = this.sourceData.count(kind);
                  return {
                    kind,
                    label,
                    count,
                  };
                },
              );
            },
            get maxSourceCount() {
              return Math.ceil(this.userCount * 0.05);
            },
            get isRunnable() {
              return (
                this.runStatus === "none" &&
                INFOS_BY_SOURCE[this.scenario].every(
                  (kind) => this.sourceData.count(kind) > 0,
                )
              );
            },
            get isNone() {
              return this.runStatus === "none";
            },
            get isSpreading() {
              return (
                this.runStatus === "running" || this.runStatus === "paused"
              );
            },
            get isPaused() {
              return this.runStatus === "paused";
            },
            get isFinished() {
              return this.runStatus === "finished";
            },

            // ===== Alpine init =====
            init() {
              this._buildNetwork();
              this._setupContextMenu();

              this._setFloatingPanelPositions();
              this._setupDrag();

              this._setupResizeObserver();
              // window.addEventListener("resize", () => {
              //   if (!this.isSpreading) this._renderNetwork();
              // });
              writeLog(
                "シミュレーターを起動しました。ノードを右クリックで操作できます。",
              );
            },

            speedPatterns() {
              return SPEED_PATTERNS;
            },

            // ===== シナリオ切り替え =====
            setScenario(scenario) {
              if (this.isSpreading) return;
              this.scenario = scenario;
              this._clearAllSources();
              this._softResetStatuses();
              // balanceFloatの位置をシナリオ切り替え後に再設定
              // this.$nextTick(() => this._setFloatingPanelPositions());
              _updateVisuals(this);
              _drawGraph(this.userCount, this.scenario);
              // [todo]
              writeLog(`${SCENARIO_TAB[scenario]}シナリオ`);
            },

            // ===== ネットワーク操作 =====
            regenerateNetwork() {
              if (this.isSpreading) return;
              _nodes.forEach((n) => {
                n.x = undefined;
                n.y = undefined;
                n.vx = 0;
                n.vy = 0;
              });
              this._buildNetwork();
              _graphData = [];
              _drawGraph(this.userCount, this.scenario);
              writeLog("ネットワークを再生成しました");
            },

            // ===== 発信源操作 =====
            /**
             * @param {Info} kind
             */
            removeSource(kind) {
              this.sourceData.pop(kind);
              _updateVisuals(this);
            },
            /**
             * @param {Info} kind
             */
            clearSource(kind) {
              this.sourceData.clear(kind);
              _updateVisuals(this);
            },
            /**
             * @param {Info} kind
             */
            addRundomSource(kind) {
              let excludes;
              switch (kind) {
                case "plain":
                  excludes = [...this.sourceData.plain.ids];
                  break;
                case "false":
                  excludes = [
                    ...this.sourceData.false.ids,
                    ...this.sourceData.true.ids,
                  ];
                  break;
                case "true":
                  excludes = [
                    ...this.sourceData.true.ids,
                    ...this.sourceData.false.ids,
                  ];
                  break;
                default:
                  return;
              }
              this.sourceData.push(kind, this._newSource(excludes));
              _updateVisuals(this);
            },
            /**
             * @param {Info} itemSource
             */
            toggleSource(itemSource) {
              const node = this.contextMenu.node;
              if (node.source === itemSource) {
                this.sourceData.remove(node.id);
              } else {
                if (node.source != null) {
                  this.sourceData.remove(node.id);
                }
                this.sourceData.push(node.id);
              }
              this._closeContextMenu();
            },

            onInfluencerCountChange() {
              _updateInfluencers(this.influencerCount);
              _updateVisuals(this);
            },

            // ===== シミュレーション制御 =====
            handleStart() {
              if (this.isSpreading) {
                return;
              }
              this.runStatus = "running";
              _graphData = [];
              _time50 = null;
              _time90 = null;
              this.ui = { ...this.ui, time50: "--", time90: "--", done: "--" };

              if (this.scenario === "basic") {
                this._startBasicScenario();
              } else {
                this._startCorrectionScenario();
              }
            },
            handleAbortOrReset() {
              let msg;
              if (this.isSpreading) {
                msg = "■ 中断しました";
              } else if (this.isFinished) {
                msg = "リセットしました";
              } else {
                return;
              }
              this._softResetStatuses();
              _updateVisuals(this);
              _drawGraph(this.userCount, this.scenario);
              writeLog(msg);
            },

            handlePauseOrResume() {
              if (this.runStatus === "running") {
                this.runStatus = "paused";
                writeLog("一時停止");
              } else if (this.isPaused) {
                this.runStatus = "running";
                writeLog("再開");
              }
            },

            handleStep() {
              if (this.isPaused) {
                _stepRequested = true;
              }
            },

            _buildNetwork() {
              _seed += 1;
              const tempLinks = generateBA(
                this.userCount,
                this.mParam,
                _seededRandom(_seed),
              );
              _resetStat();
              activeLinkMap.clear();
              this.sourceData.clearAll();
              _shuffleSpeeds();
              _updateInfluencers(this.influencerCount);

              this._renderNetwork(tempLinks);
            },

            /**
             * @param {Link<number>} tempLinks
             */
            _renderNetwork(tempLinks) {
              const svgEl = document.getElementById("network");
              const width = svgEl.clientWidth || 800;
              const height = svgEl.clientHeight || 600;

              // ノード間の距離を制御するパラメータ
              let linkDist = 50;
              let repulsion = -100;
              let colRadius = 20;
              // (this.userCount > 300) { linkDist = 50; repulsion = -100; colRadius = 10;
              // (this.userCount > 200) { linkDist = 60; repulsion = -180; colRadius = 14;
              // (this.userCount > 100) { linkDist = 70; repulsion = -180; colRadius = 14;
              // (this.userCount > 50) {  linkDist = 50; repulsion = -100; colRadius = 10;
              // linkDist = 100;   repulsion = -260;   colRadius = 18;

              const svg = d3.select("#network");
              if (svg.node().__zoom) svg.node().__zoom = d3.zoomIdentity;
              svg.selectAll("*").remove();

              const zoomGroup = svg.append("g").attr("class", "zoom-container");
              const zoomBehavior = d3
                .zoom()
                .scaleExtent([0.1, 10])
                .on("zoom", (e) => zoomGroup.attr("transform", e.transform));
              svg.call(zoomBehavior);
              this._zoomBehavior = zoomBehavior;
              this._zoomSvg = svg;

              // d3だとホイールが効かない領域があるため、mainのイベントを委譲する
              document.getElementById("main").addEventListener(
                "wheel",
                (e) => {
                  if (!e.isTrusted) return;
                  e.preventDefault();
                  svgEl.dispatchEvent(new WheelEvent("wheel", e));
                },
                { passive: false },
              );

              const jitter = _seededRandom(_seed + 999);
              _nodes.forEach((n) => {
                if (n?.x === undefined) {
                  n.x = width / 2 + (jitter() - 0.5) * linkDist;
                  n.y = height / 2 + (jitter() - 0.5) * linkDist;
                }
              });

              // forceLinkによってtempLinksがLink<Node>[]に変わる
              const forceLink = d3
                .forceLink(tempLinks)
                .id((d) => d.id)
                .distance(linkDist)
                .strength(0.3);
              _links = tempLinks;

              _linkSelection = zoomGroup
                .append("g")
                .attr("class", "links")
                .selectAll("line")
                .data(_links)
                .enter()
                .append("line");
              // .attr("class", "link");

              const nodeG = zoomGroup.append("g").attr("class", "nodes");
              const nodeEnter = nodeG
                .selectAll("g.node-g")
                .data(_nodes)
                .enter()
                .append("g")
                .attr("class", "node-g");

              const draggable = d3
                .drag()
                .on("start", (event, d) => {
                  if (!event.active && _simulation)
                    _simulation.alphaTarget(0.2).restart();
                  d.fx = d.x;
                  d.fy = d.y;
                })
                .on("drag", (event, d) => {
                  if (this.isSpreading) return;
                  d.fx = event.x;
                  d.fy = event.y;
                })
                .on("end", (event, d) => {
                  if (!event.active && _simulation) _simulation.alphaTarget(0);
                  d.fx = null;
                  d.fy = null;
                });

              _nodeSelection = nodeEnter
                .append("circle")
                // .attr("class", (d) => _nodeClass(d))
                .attr("r", (d) => _nodeRadius(d))
                .call(draggable);

              _labelSelection = nodeEnter
                .append("text")
                .attr("class", "speed-label")
                .attr("text-anchor", "middle");

              // .attr("dy", (d) => -(this._nodeRadius(d) + 3))
              // .text((d) =>  this.showSpeedIcons ? SPEED_PATTERNS[d.speedIndex].arrow : "")
              // .style("fill", (d) => SPEED_PATTERNS[d.speedIndex].color);

              if (_simulation) _simulation.stop();

              _simulation = d3
                .forceSimulation(_nodes)
                .alphaDecay(0.04)
                .alphaMin(0.001)
                .velocityDecay(0.45)
                .force("link", forceLink)
                .force(
                  "charge",
                  d3.forceManyBody().strength(repulsion).distanceMax(400),
                )
                .force(
                  "center",
                  d3.forceCenter(width / 2, height / 2).strength(0.05),
                )
                .force(
                  "collision",
                  d3
                    .forceCollide()
                    .radius(colRadius)
                    .strength(0.8)
                    .iterations(2),
                )
                .on("tick", () => {
                  _linkSelection
                    .attr("x1", (d) => d.source.x)
                    .attr("y1", (d) => d.source.y)
                    .attr("x2", (d) => d.target.x)
                    .attr("y2", (d) => d.target.y);
                  nodeEnter.attr(
                    "transform",
                    (d) => `translate(${d.x},${d.y})`,
                  );
                });

              d3.select("#zoomInBtn").on("click", () =>
                svg.transition().duration(200).call(zoomBehavior.scaleBy, 1.3),
              );
              d3.select("#zoomOutBtn").on("click", () =>
                svg.transition().duration(200).call(zoomBehavior.scaleBy, 0.7),
              );
              d3.select("#zoomResetBtn").on("click", () =>
                svg
                  .transition()
                  .duration(300)
                  .call(zoomBehavior.transform, d3.zoomIdentity),
              );

              // コンテキストメニューの設定
              _nodeSelection.on("contextmenu", (event, node) => {
                event.preventDefault();
                node.isHighlighted = true;
                this.contextMenu = newContextMenu(
                  event.clientX,
                  event.clientY,
                  node,
                  this.scenario,
                );
                _updateVisuals(this);
              });
              _updateVisuals(this);
            },

            _setupContextMenu() {
              document.addEventListener("click", () =>
                this._closeContextMenu(),
              );
              document.addEventListener("contextmenu", (e) => {
                if (!e.target.closest(".node-g")) this._closeContextMenu();
              });
            },
            _closeContextMenu() {
              if (this.contextMenu) {
                this.contextMenu.node.isHighlighted = false;
                this.contextMenu = null;
                _updateVisuals(this);
              }
            },

            changeSpeed(index) {
              this.contextMenu.node.speedIndex = index;
              this.updateSpeedLabels();
              this._closeContextMenu();
            },
            updateSpeedLabels() {
              drawSpeedIcons(this.showSpeedIcons);
            },

            _makeDraggable(parent, el, handle = null) {
              let offsetX, offsetY;
              if (handle === null) handle = el;
              handle.addEventListener("mousedown", (e) => {
                if (
                  e.target.tagName === "INPUT" ||
                  e.target.tagName === "BUTTON"
                )
                  return;
                e.preventDefault();
                const pr = parent.getBoundingClientRect();
                const rect = el.getBoundingClientRect();
                offsetX = e.clientX - rect.left + pr.left;
                offsetY = e.clientY - rect.top + pr.top;
                el.style.transform = "none";
                const onMove = (e) => {
                  el.style.left = `${e.clientX - offsetX}px`;
                  el.style.top = `${e.clientY - offsetY}px`;
                };
                const onUp = () => {
                  document.removeEventListener("mousemove", onMove);
                  document.removeEventListener("mouseup", onUp);
                };
                document.addEventListener("mousemove", onMove);
                document.addEventListener("mouseup", onUp);
              });
            },

            /**
             * @param {HTMLElement} mainEl
             */
            _setupDrag(mainEl) {
              this._makeDraggable(
                document.getElementById("main"),
                document.getElementById("livePanel"),
                document.getElementById("panelDragHandle"),
              );
              this._makeDraggable(
                document.getElementById("main"),
                document.getElementById("balanceFloat"),
              );
            },
            _setFloatingPanelPositions() {
              const pr = document
                .getElementById("main")
                .getBoundingClientRect();
              const lp = document.getElementById("livePanel");
              const lr = lp.getBoundingClientRect();
              lp.style.left = `${pr.width - lr.width - 14}px`;
              lp.style.top = `${pr.height - lr.height - 14}px`;
              const bf = document.getElementById("balanceFloat");
              const br = bf.getBoundingClientRect();
              bf.style.left = `${(pr.width - br.width) / 2}px`;
              bf.style.top = "14px";
            },

            _setupResizeObserver() {
              let timer = null;
              new ResizeObserver(() => {
                clearTimeout(timer);
                timer = setTimeout(
                  () => _drawGraph(this.userCount, this.scenario),
                  200,
                );
              }).observe(document.getElementById("livePanel"));
            },

            /**
             * @typedef {Object} SpreadEvent
             * @property {number} id
             * @property {number} [from]
             * @property {number} at
             * @property {number} sourceId
             */

            // ===== 拡散シミュレーション =====
            async _startBasicScenario() {
              /**
               * @type {SpreadEvent[]}
               */
              const queue = [];
              const visited = new Set();
              // const srcs = this.sourceData.count("plain") > 0 : [this._getDefaultStartNodeId()];
              this.sourceData.plain.ids.forEach((sid, index) => {
                if (visited.has(sid)) return;
                visited.add(sid);
                queue.push({
                  id: sid,
                  from: undefined,
                  at: 0,
                  sourceId: index,
                });
              });
              const prob = this.basicSpreadProbability;

              writeLog(
                `${this.sourceData.count("plain")}件の発信源から情報拡散を開始` +
                  `（伝達確率${Math.round(prob * 100)}%）`,
              );

              _startTime = performance.now();
              let currentTime = 0;
              this._recordSnapshot(0);

              try {
                while (queue.length > 0) {
                  const mode = await this._interceptLifecycle();
                  queue.sort((a, b) => a.at - b.at);
                  if (mode === "step") {
                    const stepEnd =
                      currentTime + STEP_TIME_MS / this.speedMultiplier;
                    if (queue[0].at > stepEnd) {
                      // queue.unshift(event);
                      this.runStatus = "paused";
                      continue;
                    }
                  }
                  const event = queue.shift();
                  if (!this.isSpreading) throw new Error("Aborted");
                  const delay = Math.max(0, event.at - currentTime);
                  if (!this.isPaused) await this._wait(delay);
                  currentTime = event.at;
                  const node = _nodes[event.id];

                  const oldAdoption = node.apply("plain", event.sourceId);

                  if (oldAdoption) {
                    updateStat(oldAdoption, node.adoption);
                    if (event.from != null) {
                      activeLinkMap.set(
                        event.from,
                        event.id,
                        "plain",
                        event.sourceId,
                      );
                    }
                    _pulseNode(node);
                    _updateVisuals(this);
                    node.neighbors.forEach((nid) => {
                      if (visited.has(nid)) return;
                      if (Math.random() > prob) return;
                      visited.add(nid);
                      queue.push({
                        id: nid,
                        from: event.id,
                        at:
                          currentTime +
                          this._effectiveDelay(_nodes[nid].speedIndex),
                        sourceId: event.sourceId,
                      });
                    });
                  }

                  this._updateUiMetrics();
                  this._recordSnapshot(currentTime / BASE_SPREAD_DELAY);
                }
                this._finishSpread("拡散完了");
              } catch (e) {
                if (e.message !== "Aborted") console.error(e);
              }
            },

            async _startCorrectionScenario() {
              // const falseIds =
              //   this.sourceIds.false.length > 0 ? [...this.sourceIds.false]
              //   : [this._getDefaultStartNodeId()];
              // const trueIds =
              //   this.sourceIds.true.length > 0  ? [...this.sourceIds.true]
              //   : [this._getCorrectionSourceId(falseIds[0])];

              /**
               * @type {(SpreadEvent & {type: CorrectionInfo})[]}
               */
              const queue = [];
              const visited = { false: new Set(), true: new Set() };

              const correctionStartDelay =
                (this.correctionDelaySec * 2 * BASE_SPREAD_DELAY) /
                this.speedMultiplier;

              this.sourceData.false.ids.forEach((id, index) => {
                if (visited.false.has(id)) return;
                visited.false.add(id);
                queue.push({
                  id,
                  from: undefined,
                  at: 0,
                  type: "false",
                  sourceId: index,
                });
              });
              this.sourceData.true.ids.forEach((id, index) => {
                if (visited.true.has(id)) return;
                visited.true.add(id);
                queue.push({
                  id,
                  from: undefined,
                  at: correctionStartDelay,
                  type: "true",
                  sourceId: index,
                });
              });

              const prob = {
                false: this.misinfoProbability,
                true: this.correctionSpreadProbability,
              };

              writeLog(
                `${SOURCE_PROPS.false.name}${this.sourceData.count("false")}件、` +
                  `${SOURCE_PROPS.true.name}${this.sourceData.count("true")}件` +
                  `（${this.correctionDelaySec.toFixed(1)}秒後）`,
              );

              _startTime = performance.now();
              let currentTime = 0;
              this._recordSnapshot(0);

              try {
                while (queue.length > 0) {
                  const mode = await this._interceptLifecycle();
                  queue.sort((a, b) => a.at - b.at);
                  if (mode === "step") {
                    const stepEnd =
                      currentTime + STEP_TIME_MS / this.speedMultiplier;
                    if (queue[0].at > stepEnd) {
                      // queue.unshift(event);
                      this.runStatus = "paused";
                      continue;
                    }
                  }
                  const event = queue.shift();
                  if (!this.isSpreading) throw new Error("Aborted");
                  const delay = Math.max(0, event.at - currentTime);
                  if (!this.isPaused) await this._wait(delay);
                  currentTime = event.at;
                  const node = _nodes[event.id];

                  // const oldStat = this._applyInfo(node, event.type, event.isSource);
                  const oldAdoption = node.apply(
                    event.type,
                    event.sourceId,
                    (cur) => {
                      return (
                        cur.kind === "adopted" &&
                        cur.info === "false" &&
                        event.type === "true" &&
                        Math.random() <= this.correctionChance
                      );
                    },
                  );
                  if (oldAdoption) {
                    updateStat(oldAdoption, node.adoption);
                    if (event.from != null) {
                      activeLinkMap.set(
                        event.from,
                        event.id,
                        event.type,
                        event.sourceId,
                      );
                    }
                    _pulseNode(node);
                    _updateVisuals(this);
                    node.neighbors.forEach((nid) => {
                      // const target = _nodes[nid];
                      if (visited[event.type].has(nid)) return;
                      // if (event.type === "false" && target.status !== "idle") return;
                      // if (event.type === "corrected" && target.status !== "idle" && target.status !== "false") return;
                      // const threshold = event.type === "false" ? this.misinfoProbability : this.correctionSpreadProbability;
                      if (Math.random() > prob[event.type]) return;
                      visited[event.type].add(nid);
                      queue.push({
                        id: nid,
                        from: event.id,
                        at:
                          currentTime +
                          this._effectiveDelay(_nodes[nid].speedIndex),
                        sourceId: event.sourceId,
                        type: event.type,
                      });
                    });
                  }
                  this._updateUiMetrics();
                  this._recordSnapshot(currentTime / BASE_SPREAD_DELAY);
                }
                this._finishSpread("シナリオ終了");
              } catch (e) {
                if (e.message !== "Aborted") console.error(e);
              }
            },

            async _interceptLifecycle() {
              if (!this.isSpreading) throw new Error("Aborted");
              while (this.isPaused) {
                if (_stepRequested) {
                  _stepRequested = false;
                  return "step";
                }
                await this._wait(80);
                if (!this.isSpreading) throw new Error("Aborted");
              }
              return "normal";
            },

            _wait(ms) {
              return new Promise((r) => setTimeout(r, ms));
            },
            /**
             * @param { number } speedIndex
             */
            _effectiveDelay(speedIndex) {
              return SPEED_PATTERNS[speedIndex].ms / this.speedMultiplier;
            },

            _updateUiMetrics() {
              const total = this.userCount;
              const fp = Math.round((stat.false / total) * 100);
              const tp = Math.round((stat.true / total) * 100);
              const reached = total - stat.vacuous;
              const elapsed = (performance.now() - _startTime) / 1000;
              if (!_time50 && reached >= this.userCount * 0.5) {
                _time50 = elapsed;
                this.ui = { ...this.ui, time50: elapsed.toFixed(2) + "秒" };
              }
              if (!_time90 && reached >= this.userCount * 0.9) {
                _time90 = elapsed;
                this.ui = { ...this.ui, time90: elapsed.toFixed(2) + "秒" };
              }
              this.ui = {
                ...this.ui,
                reached: Math.round((reached / total) * 100) + "%",
                falseCount: stat.false + "人",
                trueCount: stat.true + "人",
                barFalsePct: fp,
                barTruePct: tp,
                barIdlePct: Math.max(0, 100 - fp - tp),
              };
            },

            _resetUiMetrics() {
              _time50 = null;
              _time90 = null;
              this.ui = {
                reached: "0%",
                falseCount: "0人",
                trueCount: "0人",
                time50: "--",
                time90: "--",
                done: "--",
                barFalsePct: 0,
                barIdlePct: 100,
                barTruePct: 0,
              };
            },

            _finishSpread(label) {
              const dur = (performance.now() - _startTime) / 1000;
              this.ui = {
                ...this.ui,
                time50: _time50 ? this.ui.time50 : "未到達",
                time90: _time90 ? this.ui.time90 : "未到達",
                done: dur.toFixed(2) + "秒",
              };
              this.runStatus = "finished";
              _updateVisuals(this);
              writeLog(`🏁 ${label}：計${dur.toFixed(2)}秒`);
            },

            _softResetStatuses() {
              this.runStatus = "none";
              _stepRequested = false;
              // this.sourceData.clearAll();
              resetAdoption();
              this._resetUiMetrics();
              _graphData = [];
            },

            /**
             * @param {number} step
             */
            _recordSnapshot(step) {
              _graphData.push({ step, ...stat });
              _drawGraph(this.userCount, this.scenario);
            },

            legends() {
              if (this.scenario === "basic") {
                return [
                  ALL_LEGENDS.vacuous,
                  ALL_LEGENDS.influencer,
                  ALL_LEGENDS.plain,
                ];
              } else {
                return [
                  ALL_LEGENDS.vacuous,
                  ALL_LEGENDS.influencer,
                  ALL_LEGENDS.sourceFalse,
                  ALL_LEGENDS.sourceTrue,
                  ALL_LEGENDS.false,
                  ALL_LEGENDS.true,
                ];
              }
            },

            // ===== ユーティリティ =====
            /**
             * @param {int[]} excludeIds
             */
            _newSource(excludeIds) {
              const l = _nodes.length - excludeIds.length;
              let i = Math.floor(Math.random() * l);
              for (const id of excludeIds) {
                if (i >= id) {
                  i++;
                } else {
                  break;
                }
              }
              return i;
            },

            _getDefaultStartNodeId() {
              const n = _nodes.find((n) => !n.isInfluencer);
              return n?.id ?? 0;
            },

            /**
             * @param { number } falseId
             */
            _getCorrectionSourceId(falseId) {
              const infs = _nodes.filter(
                (n) => n.isInfluencer && n.id !== falseId,
              );
              if (infs.length > 0) return infs[0].id;
              const n = _nodes.reduce((best, n) => {
                if (n.id === falseId) return best;
                const d = n.degree || 0;
                const bd = best?.degree || -1;
                return d > bd ? n : best;
              }, null);
              return n?.id ?? 0;
            },
          };
        }
        return { simulator };
      })();
    </script>
  </body>
