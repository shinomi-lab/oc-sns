        const trueInfoDelaySlider = {
          min: 0,
          max: 12,
          step: 1,
          value: 4,
          get into() {
            return this.value / 4;
          },
          get valueLabel() {
            return this.into.toFixed(2) + "秒後";
          },
          label: `${INFO_PROPS.true.longName}の発信タイミング`,
        };

        /**
         * @type { Node[] }
         */
        let _nodes = [];
        /**
         * @type { Link<Node>[] }
         */
        let _links = [];
        /**
         * @type { Node[] }
         */
        let _sortedNodes = [];

        let oldCount = 0;
        const activeLinkMap = {
          /**
           * @typedef {Object} ActiveLink
           * @property {Info} info
           * @property {number} sourceId
           */

          /** @type {Map<string, ActiveLink>} */
          inner: new Map(),
          /**
           * @param {number} id1
           * @param {number} id2
           */
          _key(id1, id2) {
            return id1 < id2 ? `${id1}-${id2}` : `${id2}-${id1}`;
          },
          clear() {
            this.inner.clear();
          },
          /**
           * @param {number} id1
           * @param {number} id2
           * @param {Info} info
           * @param {number} sourceId
           */
          set(id1, id2, info, sourceId) {
            this.inner.set(this._key(id1, id2), { info, sourceId });
          },
          /**
           * @param {number} id1
           * @param {number} id2
           * @returns {ActiveLink | undefined}
           */
          get(id1, id2, value) {
            return this.inner.get(this._key(id1, id2));
          },
        };

        /**
         * @typedef {Object} HSL
         * @property {number} h
         * @property {number} s
         * @property {number} l
         */

        /**
         * @typedef {"vacuous" | Info} StatKey
         */

        /**
         */
        const COLORS = {
          get vacuous() {
            return getCssHsl("--vacuous-base");
          },
          get plain() {
            return getCssHsl("--plain-base");
          },
          get false() {
            return getCssHsl("--false-base");
          },
          get true() {
            return getCssHsl("--true-base");
          },
        };

        /**
         * @param {HSL} hsl
         * @param {number} count
         */
        function newColorMap(hsl, count) {
          let { h, s, l } = hsl;
          return Array.from({ length: count }, (_, i) => {
            const t = count === 1 ? 0.5 : i / (count - 1);
            // 明度はベース値より常に明るく（0.75〜1.0倍+底上げ）してvacuousより暗くならないよう保証
            const lBright = Math.min(0.95, l + 0.15 + t * 0.1);
            /** @type {string} */
            const color = d3
              .hsl((h + (t - 0.5) * 20) % 360, Math.min(1, s + 0.1), lBright)
              .toString();
            return color;
          });
        }

        /**
         * @typedef {Record<StatKey, number>} Stat
         * @type {Stat}
         */
        const stat = {
          vacuous: 0,
          plain: 0,
          false: 0,
          true: 0,
        };

        /**
         * @param {Adoption} adoption
         * @returns {StatKey}
         */
        function adoptionToStatKey(adoption) {
          if (adoption.kind === "vacuous") {
            return "vacuous";
          } else {
            return adoption.info;
          }
        }

        /**
         * @param {Adoption} oldAdoption
         * @param {Adoption} newAdoption
         */
        function updateStat(oldAdoption, newAdoption) {
          stat[adoptionToStatKey(oldAdoption)]--;
          stat[adoptionToStatKey(newAdoption)]++;
        }

        function _resetStat() {
          stat.vacuous = _nodes.length;
          stat.plain = 0;
          stat.false = 0;
          stat.true = 0;
        }

        function resetAdoption() {
          _nodes.forEach((n) => (n.adoption = { kind: "vacuous" }));
          _resetStat();
          activeLinkMap.clear();
        }

        /**
         * @type {({step: number} & Stat)[]}
         */
        let _graphData = [];

        /**
         * @param {number} userCount
         * @param {Scenario} scenario
         */
        function _drawGraph(userCount, scenario) {
          const gSvg = d3.select("#graphSvg");
          const container = document.getElementById("graphSvg");
          const W = container.clientWidth || 420;
          const H = container.clientHeight || 120;
          gSvg.selectAll("*").remove();
          if (_graphData.length < 2) return;
          const m = { top: 12, right: 52, bottom: 20, left: 42 };
          const cw = W - m.left - m.right,
            ch = H - m.top - m.bottom;
          const g = gSvg
            .append("g")
            .attr("transform", `translate(${m.left},${m.top})`);
          const maxStep = _graphData.at(-1).step || 1;
          const xS = d3.scaleLinear().domain([0, maxStep]).range([0, cw]);
          const yS = d3.scaleLinear().domain([0, 100]).range([ch, 0]);
          g.append("g")
            .attr("transform", `translate(0,${ch})`)
            .attr("class", "axis")
            .call(
              d3
                .axisBottom(xS)
                .ticks(5)
                .tickFormat((d) => `${d}s`),
            )
            .style("font-size", "11px")
            .style("color", "var(--subtle)");
          g.append("g")
            .attr("class", "axis")
            .call(
              d3
                .axisLeft(yS)
                .ticks(4)
                .tickFormat((d) => `${d}%`),
            )
            .style("font-size", "11px")
            .style("color", "var(--subtle)");

          // グリッド線（水平・垂直）
          g.append("g")
            .attr("class", "grid")
            .call(d3.axisLeft(yS).ticks(4).tickSize(-cw).tickFormat(""))
            .call((g) => g.select(".domain").remove())
            .call((g) =>
              g
                .selectAll(".tick line")
                .attr("stroke", "var(--line-soft)")
                .attr("stroke-opacity", 0.5)
                .attr("stroke-dasharray", "3,3"),
            );
          g.append("g")
            .attr("class", "grid")
            .attr("transform", `translate(0,${ch})`)
            .call(d3.axisBottom(xS).ticks(5).tickSize(-ch).tickFormat(""))
            .call((g) => g.select(".domain").remove())
            .call((g) =>
              g
                .selectAll(".tick line")
                .attr("stroke", "var(--line-soft)")
                .attr("stroke-opacity", 0.5)
                .attr("stroke-dasharray", "3,3"),
            );

          // 折れ線と終点ラベルを描く共通関数
          const drawLine = (key, color) => {
            g.append("path")
              .datum(_graphData)
              .attr("fill", "none")
              .attr("stroke", color)
              .attr("stroke-width", 2)
              .attr(
                "d",
                d3
                  .line()
                  .x((d) => xS(d.step))
                  .y((d) => yS((d[key] / userCount) * 100)),
              );
            const last = _graphData.at(-1);
            if (last && last[key] != null) {
              const pct = Math.round((last[key] / userCount) * 100);
              g.append("text")
                .attr("x", cw + 4)
                .attr("y", yS((last[key] / userCount) * 100) + 4)
                .attr("font-size", "12px")
                .attr("font-weight", "700")
                .attr("fill", color)
                .text(`${pct}%`);
            }
          };

          if (scenario === "basic") {
            drawLine("plain", "var(--plain-base)");
          } else {
            drawLine("false", "var(--false-base)");
            drawLine("true", "var(--true-base)");
          }
        }

        /**
         * @param { number } n
         * @param { number } m
         * @param { () => number } random
         * @returns { Link<number> }
         */
        function generateBA(n, m, random) {
          const mClamped = Math.min(m, n - 1);
          /** @type { Node[] } */
          const nodes = d3.range(n).map(newNode);
          /** @type { Link[] } */
          const tempLinks = [];

          /**
           *  @param { number } a
           *  @param { number } b
           */
          const addLink = (a, b) => {
            if (a === b) return;
            if (nodes[a].outNeighbors.has(b)) {
              return;
            }
            tempLinks.push({ source: a, target: b });
            nodes[a].outNeighbors.add(b);
            nodes[b].inNeighbors.add(a);
          };

          const initSize = Math.min(mClamped + 1, n);
          for (let i = 0; i < initSize; i++) {
            for (let j = i + 1; j < initSize; j++) {
              addLink(i, j);
            }
          }

          for (let i = initSize; i < n; i++) {
            const targets = new Set();
            let attempts = 0;
            while (
              targets.size < Math.min(mClamped, i) &&
              attempts < mClamped * 20
            ) {
              attempts++;
              let r = random() * (tempLinks.length * 2 || 1),
                cumul = 0;
              for (let j = 0; j < i; j++) {
                cumul += nodes[j].degree;
                if (r <= cumul && !targets.has(j)) {
                  targets.add(j);
                  break;
                }
              }
            }
            targets.forEach((t) => addLink(t, i));
          }
          _nodes = nodes;
          _sortedNodes = [..._nodes].sort((a, b) => b.degree - a.degree);

          // 次数統計計算
          _avgDegree = _nodes.reduce((s, n) => s + n.degree, 0) / _nodes.length;
          _maxDegree = _nodes.reduce((max, n) => Math.max(max, n.degree), 0);
          _influencerThreshold = _avgDegree * 1.5;

          // アイコンID割り当て（全600枚からシードベースでランダム）
          const iconRandom = _seededRandom(_seed * 13 + n * 7);
          const iconPool = Array.from({ length: 600 }, (_, i) => i + 1);
          for (let i = iconPool.length - 1; i > 0; i--) {
            const j = Math.floor(iconRandom() * (i + 1));
            [iconPool[i], iconPool[j]] = [iconPool[j], iconPool[i]];
          }
          nodes.forEach((node, i) => {
            node.iconId = iconPool[i % iconPool.length];
          });

          return tempLinks;
        }

        /**
         * @typedef {Object} ContextMenu
         * @property {Node} node
         * @property {number} x
         * @property {number} y
         * @property {string} title
         * @property {{kind: Info, label: string}[]} sources
         */

        /**
         * @param {number} x
         * @param {number} y
         * @param {Node} node
         * @param {Scenario} scenario
         * @returns {ContextMenu}
         */
        function newContextMenu(x, y, node, scenario) {
          const menuW = 175;
          const menuH = 240;
          if (x + menuW > window.innerWidth) x -= menuW;
          if (y + menuH > window.innerHeight) y -= menuH;

          const title = `ユーザー ID:${node.id}`;
          const sources = INFOS_BY_SOURCE[scenario].map(
            (/** @type {Info} */ kind) => {
              const prop = SOURCE_PROPS[kind];
              const msg = node.source === kind ? "を解除" : "に設定";
              return {
                kind,
                label: `${prop.name}${msg}`,
              };
            },
          );
          return {
            x,
            y,
            title,
            sources,
            node,
          };
        }

        // D3オブジェクト
        let _simulation = null;
        let _nodeSelection = null;
        let _nodeBgSelection = null;
        let _nodeGSelection = null;
        let _linkSelection = null;

        /**
         * @param {Node} node
         */
        /**
         * ユーザー数に応じてノードサイズを2段階で切り替える。
         * 元アイコンが64×64pxのドット絵なので、整数倍（64px or 32px）にして滲みを防ぐ。
         * @param {number} userCount
         * @returns {number}
         */
        function _nodeSize(node) {
          if (
            _maxDegree <= _influencerThreshold ||
            node.degree < _influencerThreshold
          ) {
            return 32;
          }
          const t =
            (node.degree - _influencerThreshold) /
            (_maxDegree - _influencerThreshold);
          return Math.round(32 + t * 32);
        }

        function _nodeRadius(node) {
          return _nodeSize(node) / 2;
        }

        /**
         * @param {Node} node
         */
        function _nodeClass(node) {
          const classes = ["node"];
          if (node.source != null) classes.push(`source-${node.source}`);
          if (node.isHighlighted) classes.push("highlighted");
          return classes.join(" ");
        }

        /**
         * @param {Node} node
         * @param {Record<Info, { colors: string[] }>} sourceData
         */
        function _nodeColor(node, sourceData) {
          if (node.adoption.kind === "vacuous") {
            return COLORS.vacuous.raw;
          }
          return sourceData[node.adoption.info].colors[node.adoption.sourceId];
        }

        /**
         * @param {Node} node
         */
        function _pulseNode(node) {
          if (!_nodeGSelection) return;
          _nodeGSelection
            .filter((d) => d.id === node.id)
            .each(function () {
              const el = this;
              el.classList.remove("pulsing");
              void el.offsetWidth;
              el.classList.add("pulsing");
              el.addEventListener(
                "animationend",
                () => el.classList.remove("pulsing"),
                { once: true },
              );
            });
        }

        /**
         * @param {Link<Node>} link
         * @param {Record<Info, { colors: string[] }>} sourceData
         * @returns {string}
         */
        function _linkStyle(link, sourceData) {
          const a = activeLinkMap.get(link.source.id, link.target.id);
          let stroke, width, opacity;
          if (!a) {
            stroke = COLORS.vacuous.raw;
            width = 1.5;
            opacity = 0.45;
          } else {
            stroke = sourceData[a.info].colors[a.sourceId];
            width = 3.5;
            opacity = 0.7;
          }
          return `stroke:${stroke};stroke-width:${width};stroke-opacity:${opacity}`;
        }

        function _updateVisuals(comp) {
          _nodeBgSelection?.attr("fill", (d) => _nodeColor(d, comp.sourceData));
          // コンテキストメニュー表示中のノードを暗化
          _nodeSelection
            ?.attr("fill", (d) =>
              d.isHighlighted ? "rgba(0,0,0,0.45)" : "transparent",
            )
            ?.attr("fill-opacity", (d) => (d.isHighlighted ? 1 : 0));
          // node-overlayのfillはpulseアニメーション中なので上書きしない
          // 発信源枠線更新
          _nodeBgSelection
            ?.attr("stroke", (d) => {
              if (d.source === "plain") return "var(--plain-base)";
              if (d.source === "false") return "var(--false-base)";
              if (d.source === "true") return "var(--true-base)";
              return "none";
            })
            ?.attr("stroke-width", (d) => (d.source != null ? 3 : 0));
          _linkSelection?.attr("style", (d) => _linkStyle(d, comp.sourceData));
        }

        let _seed = 42;
        let _time50 = null;
        let _time90 = null;

        // Alpine コンポーネント定義
        function simulator() {
          let _startTime = 0;
          let _stepRequested = false;

          return {
            // ===== Alpine リアクティブ状態（UI表示に関わるもの） =====
            /**
             * @type {Scenario}
             */
            theme: "dark",
            scenario: "basic",
            userCount: 100,
            mParam: 1,

            speedSlider: 100,
            speedMultiplier: 1.0,
            /**
             * @type { "none" | "running" | "paused" | "finished" }
             */
            runStatus: "none",
            panelMinimized: false,
            // UI表示用まとめオブジェクト（統計・バランスメータ）
            ui: {
              barFalsePct: 0,
              barIdlePct: 100,
              barTruePct: 0,
            },

            /**
             * @type {ContextMenu | null}
             */
            contextMenu: null,

            /**
             * @type {{kind: Scenario; label: string}[]}
             */
            get scenarioTabs() {
              return [
                { kind: "basic", label: SCENARIO_TAB.basic },
                { kind: "correction", label: SCENARIO_TAB.correction },
              ];
            },

            sliders() {
              if (this.scenario === "basic") {
                return [basicInfoSlider];
              } else {
                return [
                  misInfoSlider,
                  trueInfoSlider,
                  trueInfoDelaySlider,
                  correctChanceSlider,
                ];
              }
            },

            // スライダー値の変換後の値のゲッター（変換は各スライダーパラメータで定義）
            get basicSpreadProbability() {
              return basicInfoSlider.into;
            },
            get misinfoProbability() {
              return misInfoSlider.into;
            },
            get correctionSpreadProbability() {
              return trueInfoSlider.into;
            },
            get correctionChance() {
              return correctChanceSlider.into;
            },
            get correctionDelaySec() {
              return trueInfoDelaySlider.into;
            },

            sourceData: {
              plain: {
                /** @type {number[]} */
                ids: [],
                /** @type {string[]} */
                colors: [],
              },
              false: {
                /** @type {number[]} */
                ids: [],
                /** @type {string[]} */
                colors: [],
              },
              true: {
                /** @type {number[]} */
                ids: [],
                /** @type {string[]} */
                colors: [],
              },
              /** @param {Info} kind */
              count(kind) {
                return this[kind].ids.length;
              },
              clearAll() {
                this.clear("plain");
                this.clear("false");
                this.clear("true");
              },
              /** @param {Info} kind */
              clear(kind) {
                this[kind].ids.forEach((id) => {
                  _nodes[id].source = undefined;
                });
                this[kind].ids = [];
                this[kind].colors = [];
                writeLog(`${SOURCE_PROPS[kind].name}をリセットしました`);
              },
              /**
               * @param {Info} kind
               * @param {number} id
               */
              push(kind, id) {
                this[kind].ids.push(id);
                _nodes[id].source = kind;
                this[kind].colors = newColorMap(
                  COLORS[kind].hsl,
                  this[kind].ids.length,
                );
                writeLog(`${SOURCE_PROPS[kind].name}を1つ追加しました`);
              },
              /** @param {Info} kind */
              pop(kind) {
                const id = this[kind].ids.pop();
                _nodes[id].source = undefined;
                this[kind].colors = newColorMap(
                  COLORS[kind].hsl,
                  this[kind].ids.length,
                );
                writeLog(
                  `ノード${id}の${SOURCE_PROPS[kind].name}を解除しました`,
                );
              },
              /**
               * @param {Info} kind
               * @param {number} id
               */
              remove(kind, id) {
                this[kind].ids = this[kind].ids.filter((i) => i !== id);
                _nodes[id].source = undefined;
                this[kind].colors = newColorMap(
                  COLORS[kind].hsl,
                  this[kind].ids.length,
                );
                writeLog(
                  `ノード${id}の${SOURCE_PROPS[kind].name}を解除しました`,
                );
              },
            },

            get availableSources() {
              return INFOS_BY_SOURCE[this.scenario].map(
                (/** @type {Info} */ kind) => {
                  /** @type {string} */
                  const label =
                    SOURCE_PROPS[kind]?.longName ?? SOURCE_PROPS[kind].name;
                  const count = this.sourceData.count(kind);
                  return {
                    kind,
                    label,
                    count,
                  };
                },
              );
            },
            get maxSourceCount() {
              return Math.ceil(this.userCount * 0.05);
            },
            get isRunnable() {
              return (
                this.runStatus === "none" &&
                INFOS_BY_SOURCE[this.scenario].every(
                  (kind) => this.sourceData.count(kind) > 0,
                )
              );
            },
            get isNone() {
              return this.runStatus === "none";
            },
            get isSpreading() {
              return (
                this.runStatus === "running" || this.runStatus === "paused"
              );
            },
            get isPaused() {
              return this.runStatus === "paused";
            },
            get isFinished() {
              return this.runStatus === "finished";
            },

            // ===== Alpine init =====
            init() {
              applyTheme(this.theme);
              this.$watch("theme", (name) => applyTheme(name));
              this._buildNetwork();
              this._setupContextMenu();

              this._setFloatingPanelPositions();
              this._setupDrag();

              this._setupResizeObserver();
              // window.addEventListener("resize", () => {
              //   if (!this.isSpreading) this._renderNetwork();
              // });
              writeLog(
                "シミュレーターを起動しました。ノードを右クリックで操作できます。",
              );
            },

            // ===== シナリオ切り替え =====
            setScenario(scenario) {
              if (this.isSpreading) return;
              this.scenario = scenario;
              this.sourceData.clearAll();
              this._softResetStatuses();
              // balanceFloatの位置をシナリオ切り替え後に再設定
              // this.$nextTick(() => this._setFloatingPanelPositions());
              _updateVisuals(this);
              _drawGraph(this.userCount, this.scenario);
              // [todo]
              writeLog(`${SCENARIO_TAB[scenario]}シナリオ`);
            },

            // ===== ネットワーク操作 =====
            regenerateNetwork() {
              if (this.isSpreading) return;
              this.sourceData.clearAll();
              _graphData = [];
              this._buildNetwork();
              _drawGraph(this.userCount, this.scenario);
              writeLog("ネットワークを再生成しました");
            },

            // ===== 発信源操作 =====
            /**
             * @param {Info} kind
             */
            removeSource(kind) {
              this.sourceData.pop(kind);
              _updateVisuals(this);
            },
            /**
             * @param {Info} kind
             */
            clearSource(kind) {
              this.sourceData.clear(kind);
              _updateVisuals(this);
            },
            /**
             * @param {Info} kind
             */
            addRundomSource(kind) {
              let excludes;
              switch (kind) {
                case "plain":
                  excludes = [...this.sourceData.plain.ids];
                  break;
                case "false":
                  excludes = [
                    ...this.sourceData.false.ids,
                    ...this.sourceData.true.ids,
                  ];
                  break;
                case "true":
                  excludes = [
                    ...this.sourceData.true.ids,
                    ...this.sourceData.false.ids,
                  ];
                  break;
                default:
                  return;
              }
              this.sourceData.push(kind, this._newSource(excludes));
              _updateVisuals(this);
            },
            /**
             * @param {Info} itemSource
             */
            toggleSource(itemSource) {
              const node = this.contextMenu.node;
              if (node.source === itemSource) {
                this.sourceData.remove(itemSource, node.id);
              } else {
                if (node.source != null) {
                  this.sourceData.remove(node.source, node.id);
                }
                this.sourceData.push(itemSource, node.id);
              }
              _updateVisuals(this);
              this._closeContextMenu();
            },

            // ===== シミュレーション制御 =====
            handleStart() {
              if (this.isSpreading) {
                return;
              }
              this.runStatus = "running";
              _graphData = [];
              _time50 = null;
              _time90 = null;

              if (this.scenario === "basic") {
                this._startBasicScenario();
              } else {
                this._startCorrectionScenario();
              }
            },
            handleAbortOrReset() {
              let msg;
              if (this.isSpreading) {
                msg = "■ 中断しました";
              } else if (this.isFinished) {
                msg = "リセットしました";
              } else {
                return;
              }
              this._softResetStatuses();
              _updateVisuals(this);
              _drawGraph(this.userCount, this.scenario);
              writeLog(msg);
            },

            handlePauseOrResume() {
              if (this.runStatus === "running") {
                this.runStatus = "paused";
                writeLog("一時停止");
              } else if (this.isPaused) {
                this.runStatus = "running";
                writeLog("再開");
              }
            },

            handleStep() {
              if (this.isPaused) {
                _stepRequested = true;
              }
            },

            _buildNetwork() {
              _seed += 1;
              const tempLinks = generateBA(
                this.userCount,
                this.mParam,
                _seededRandom(_seed),
              );
              _resetStat();
              activeLinkMap.clear();
              this.sourceData.clearAll();

              this._renderNetwork(tempLinks);
            },

            /**
             * @param {Link<number>} tempLinks
             */
            _renderNetwork(tempLinks) {
              const svgEl = document.getElementById("network");
              const width = svgEl.clientWidth || 800;
              const height = svgEl.clientHeight || 600;

              // ノード間の距離を制御するパラメータ
              // ノードサイズ（64px or 32px）に連動して2段階切り替え
              const linkDist = 45;
              const repulsion = -400;

              const svg = d3.select("#network");
              if (svg.node().__zoom) svg.node().__zoom = d3.zoomIdentity;
              svg.selectAll("*").remove();

              const zoomGroup = svg.append("g").attr("class", "zoom-container");
              const zoomBehavior = d3
                .zoom()
                .scaleExtent([0.1, 10])
                .on("zoom", (e) => zoomGroup.attr("transform", e.transform));
              svg.call(zoomBehavior);
              this._zoomBehavior = zoomBehavior;
              this._zoomSvg = svg;

              // d3だとホイールが効かない領域があるため、mainのイベントを委譲する
              document.getElementById("main").addEventListener(
                "wheel",
                (e) => {
                  if (!e.isTrusted) return;
                  e.preventDefault();
                  svgEl.dispatchEvent(new WheelEvent("wheel", e));
                },
                { passive: false },
              );

              const jitter = _seededRandom(_seed + 999);
              _nodes.forEach((n) => {
                if (n?.x === undefined) {
                  n.x = width / 2 + (jitter() - 0.5) * linkDist;
                  n.y = height / 2 + (jitter() - 0.5) * linkDist;
                }
              });

              // forceLinkによってtempLinksがLink<Node>[]に変わる
              const forceLink = d3
                .forceLink(tempLinks)
                .id((d) => d.id)
                .distance(linkDist)
                .strength(0.3);
              _links = tempLinks;

              _linkSelection = zoomGroup
                .append("g")
                .attr("class", "links")
                .selectAll("line")
                .data(_links)
                .enter()
                .append("line");
              // .attr("class", "link");

              const nodeG = zoomGroup.append("g").attr("class", "nodes");
              _nodeGSelection = nodeG
                .selectAll("g.node-g")
                .data(_nodes)
                .enter()
                .append("g")
                .attr("class", "node-g");
              const nodeEnter = _nodeGSelection;

              const draggable = d3
                .drag()
                .on("start", (event, d) => {
                  if (!event.active && _simulation)
                    _simulation.alphaTarget(0.2).restart();
                  d.fx = d.x;
                  d.fy = d.y;
                })
                .on("drag", (event, d) => {
                  if (this.isSpreading) return;
                  d.fx = event.x;
                  d.fy = event.y;
                })
                .on("end", (event, d) => {
                  if (!event.active && _simulation) _simulation.alphaTarget(0);
                  d.fx = null;
                  d.fy = null;
                });

              // 背景rect（状態色オーバーレイ用ベース）
              _nodeBgSelection = nodeEnter
                .append("rect")
                .attr("class", "node-bg")
                .attr("x", (d) => -_nodeSize(d) / 2)
                .attr("y", (d) => -_nodeSize(d) / 2)
                .attr("width", (d) => _nodeSize(d))
                .attr("height", (d) => _nodeSize(d))
                .attr("rx", 4)
                .call(draggable);

              // アイコン画像（上半身トリミング）
              // <svg>をviewportとして使い、overflow:hiddenで上半分だけ表示
              // 元画像64×64pxをnodeSize×nodeSize*2で表示してsvgのサイズで切り取る
              // アイコン画像（32x32トリミング済み画像をノードサイズで表示）
              nodeEnter
                .append("image")
                .attr("class", "node-icon")
                .attr("x", (d) => -_nodeSize(d) / 2)
                .attr("y", (d) => -_nodeSize(d) / 2)
                .attr("width", (d) => _nodeSize(d))
                .attr("height", (d) => _nodeSize(d))
                .attr(
                  "href",
                  (d) => `icons/icon${String(d.iconId).padStart(3, "0")}.png`,
                )
                .attr("preserveAspectRatio", "xMidYMid meet")
                .style("pointer-events", "none");

              _nodeSelection = nodeEnter
                .append("rect")
                .attr("class", "node-overlay")
                .attr("x", (d) => -_nodeSize(d) / 2)
                .attr("y", (d) => -_nodeSize(d) / 2)
                .attr("width", (d) => _nodeSize(d))
                .attr("height", (d) => _nodeSize(d))
                .attr("rx", 4)
                .attr("fill", "transparent")
                .attr("fill-opacity", 0)
                .call(draggable);

              if (_simulation) _simulation.stop();

              _simulation = d3
                .forceSimulation(_nodes)
                .alphaDecay(0.04)
                .alphaMin(0.001)
                .velocityDecay(0.45)
                .force("link", forceLink)
                .force(
                  "charge",
                  d3.forceManyBody().strength(repulsion).distanceMax(400),
                )
                .force(
                  "center",
                  d3.forceCenter(width / 2, height / 2).strength(0.05),
                )
                .force(
                  "collision",
                  d3
                    .forceCollide()
                    .radius((d) => _nodeSize(d) / 2 + 4)
                    .strength(0.8)
                    .iterations(2),
                )
                .on("tick", () => {
                  _linkSelection
                    .attr("x1", (d) => d.source.x)
                    .attr("y1", (d) => d.source.y)
                    .attr("x2", (d) => d.target.x)
                    .attr("y2", (d) => d.target.y);
                  nodeEnter.attr(
                    "transform",
                    (d) => `translate(${d.x},${d.y})`,
                  );
                });

              d3.select("#zoomInBtn").on("click", () =>
                svg.transition().duration(200).call(zoomBehavior.scaleBy, 1.3),
              );
              d3.select("#zoomOutBtn").on("click", () =>
                svg.transition().duration(200).call(zoomBehavior.scaleBy, 0.7),
              );
              d3.select("#zoomResetBtn").on("click", () =>
                svg
                  .transition()
                  .duration(300)
                  .call(zoomBehavior.transform, d3.zoomIdentity),
              );

              // コンテキストメニューの設定
              _nodeSelection.on("contextmenu", (event, node) => {
                event.preventDefault();
                node.isHighlighted = true;
                _updateVisuals(this);
                this.contextMenu = newContextMenu(
                  event.clientX,
                  event.clientY,
                  node,
                  this.scenario,
                );
                _updateVisuals(this);
              });
              _updateVisuals(this);
            },

            _setupContextMenu() {
              document.addEventListener("click", () =>
                this._closeContextMenu(),
              );
              document.addEventListener("contextmenu", (e) => {
                if (!e.target.closest(".node-g")) this._closeContextMenu();
              });
            },
            _closeContextMenu() {
              if (this.contextMenu) {
                this.contextMenu.node.isHighlighted = false;
                this.contextMenu = null;
                _updateVisuals(this);
                _updateVisuals(this);
              }
            },

            _makeDraggable(parent, el, handle = null) {
              let offsetX, offsetY;
              if (handle === null) handle = el;
              handle.addEventListener("mousedown", (e) => {
                if (
                  e.target.tagName === "INPUT" ||
                  e.target.tagName === "BUTTON"
                )
                  return;
                e.preventDefault();
                const pr = parent.getBoundingClientRect();
                const rect = el.getBoundingClientRect();
                offsetX = e.clientX - rect.left + pr.left;
                offsetY = e.clientY - rect.top + pr.top;
                el.style.transform = "none";
                const onMove = (e) => {
                  el.style.left = `${e.clientX - offsetX}px`;
                  el.style.top = `${e.clientY - offsetY}px`;
                };
                const onUp = () => {
                  document.removeEventListener("mousemove", onMove);
                  document.removeEventListener("mouseup", onUp);
                };
                document.addEventListener("mousemove", onMove);
                document.addEventListener("mouseup", onUp);
              });
            },

            /**
             * @param {HTMLElement} mainEl
             */
            _setupDrag(mainEl) {
              this._makeDraggable(
                document.getElementById("main"),
                document.getElementById("livePanel"),
                document.getElementById("panelDragHandle"),
              );
              this._makeDraggable(
                document.getElementById("main"),
                document.getElementById("balanceFloat"),
              );
              this._setupPanelResize(document.getElementById("livePanel"));
            },

            _setupPanelResize(panel) {
              const handles = panel.querySelectorAll(".resize-handle");
              handles.forEach((handle) => {
                handle.addEventListener("mousedown", (e) => {
                  e.preventDefault();
                  e.stopPropagation();
                  const dir = handle.dataset.dir;
                  const startX = e.clientX;
                  const startY = e.clientY;
                  const startW = panel.offsetWidth;
                  const startH = panel.offsetHeight;
                  const startL = panel.offsetLeft;
                  const startT = panel.offsetTop;
                  const onMove = (e) => {
                    const dx = e.clientX - startX;
                    const dy = e.clientY - startY;
                    const minW = 280,
                      minH = 160;
                    if (dir.includes("e"))
                      panel.style.width = `${Math.max(minW, startW + dx)}px`;
                    if (dir.includes("s"))
                      panel.style.height = `${Math.max(minH, startH + dy)}px`;
                    if (dir.includes("w")) {
                      const nw = Math.max(minW, startW - dx);
                      panel.style.width = `${nw}px`;
                      panel.style.left = `${startL + startW - nw}px`;
                    }
                    if (dir.includes("n")) {
                      const nh = Math.max(minH, startH - dy);
                      panel.style.height = `${nh}px`;
                      panel.style.top = `${startT + startH - nh}px`;
                    }
                  };
                  const onUp = () => {
                    document.removeEventListener("mousemove", onMove);
                    document.removeEventListener("mouseup", onUp);
                    _drawGraph(this.userCount, this.scenario);
                  };
                  document.addEventListener("mousemove", onMove);
                  document.addEventListener("mouseup", onUp);
                });
              });
            },
            _setFloatingPanelPositions() {
              const pr = document
                .getElementById("main")
                .getBoundingClientRect();
              const lp = document.getElementById("livePanel");
              const lr = lp.getBoundingClientRect();
              lp.style.left = `${pr.width - lr.width - 14}px`;
              lp.style.top = `${pr.height - lr.height - 14}px`;
              const bf = document.getElementById("balanceFloat");
              const br = bf.getBoundingClientRect();
              bf.style.left = `${(pr.width - br.width) / 2}px`;
              bf.style.top = "14px";
            },

            _setupResizeObserver() {
              let timer = null;
              new ResizeObserver(() => {
                clearTimeout(timer);
                timer = setTimeout(
                  () => _drawGraph(this.userCount, this.scenario),
                  200,
                );
              }).observe(document.getElementById("livePanel"));
            },

            /**
             * @typedef {Object} SpreadEvent
             * @property {number} id
             * @property {number} [from]
             * @property {number} at
             * @property {number} sourceId
             */

            // ===== 拡散シミュレーション =====
            async _startBasicScenario() {
              /**
               * @type {SpreadEvent[]}
               */
              const queue = [];
              const visited = new Set();
              // const srcs = this.sourceData.count("plain") > 0 : [this._getDefaultStartNodeId()];
              this.sourceData.plain.ids.forEach((sid, index) => {
                if (visited.has(sid)) return;
                visited.add(sid);
                queue.push({
                  id: sid,
                  from: undefined,
                  at: 0,
                  sourceId: index,
                });
              });
              const prob = this.basicSpreadProbability;

              writeLog(
                `${this.sourceData.count("plain")}件の発信源から情報拡散を開始` +
                  `（伝達確率${Math.round(prob * 100)}%）`,
              );

              _startTime = performance.now();
              let currentTime = 0;
              this._recordSnapshot(0);

              try {
                while (queue.length > 0) {
                  const mode = await this._interceptLifecycle();
                  queue.sort((a, b) => a.at - b.at);
                  if (mode === "step") {
                    const stepEnd =
                      currentTime + STEP_TIME_MS / this.speedMultiplier;
                    if (queue[0].at > stepEnd) {
                      // queue.unshift(event);
                      this.runStatus = "paused";
                      continue;
                    }
                  }
                  const event = queue.shift();
                  if (!this.isSpreading) throw new Error("Aborted");
                  const delay = Math.max(0, event.at - currentTime);
                  if (!this.isPaused) await this._wait(delay);
                  currentTime = event.at;
                  const node = _nodes[event.id];

                  const oldAdoption = node.apply("plain", event.sourceId);

                  if (oldAdoption) {
                    updateStat(oldAdoption, node.adoption);
                    if (event.from != null) {
                      activeLinkMap.set(
                        event.from,
                        event.id,
                        "plain",
                        event.sourceId,
                      );
                    }
                    _pulseNode(node);
                    _updateVisuals(this);
                    node.neighbors.forEach((nid) => {
                      if (visited.has(nid)) return;
                      if (Math.random() > prob) return;
                      visited.add(nid);
                      queue.push({
                        id: nid,
                        from: event.id,
                        at:
                          currentTime +
                          (BASE_SPREAD_DELAY * (0.5 + Math.random())) /
                            this.speedMultiplier,
                        sourceId: event.sourceId,
                      });
                    });
                  }

                  this._updateUiMetrics(
                    (performance.now() - _startTime) / 1000,
                  );
                  this._recordSnapshot((performance.now() - _startTime) / 1000);
                }
                this._finishSpread("拡散完了");
              } catch (e) {
                if (e.message !== "Aborted") console.error(e);
              }
            },

            async _startCorrectionScenario() {
              // const falseIds =
              //   this.sourceIds.false.length > 0 ? [...this.sourceIds.false]
              //   : [this._getDefaultStartNodeId()];
              // const trueIds =
              //   this.sourceIds.true.length > 0  ? [...this.sourceIds.true]
              //   : [this._getCorrectionSourceId(falseIds[0])];

              /**
               * @type {(SpreadEvent & {type: CorrectionInfo})[]}
               */
              const queue = [];
              const visited = { false: new Set(), true: new Set() };

              const correctionStartDelay =
                (this.correctionDelaySec * 2 * BASE_SPREAD_DELAY) /
                this.speedMultiplier;

              this.sourceData.false.ids.forEach((id, index) => {
                if (visited.false.has(id)) return;
                visited.false.add(id);
                queue.push({
                  id,
                  from: undefined,
                  at: 0,
                  type: "false",
                  sourceId: index,
                });
              });
              this.sourceData.true.ids.forEach((id, index) => {
                if (visited.true.has(id)) return;
                visited.true.add(id);
                queue.push({
                  id,
                  from: undefined,
                  at: correctionStartDelay,
                  type: "true",
                  sourceId: index,
                });
              });

              const prob = {
                false: this.misinfoProbability,
                true: this.correctionSpreadProbability,
              };

              writeLog(
                `${SOURCE_PROPS.false.name}${this.sourceData.count("false")}件、` +
                  `${SOURCE_PROPS.true.name}${this.sourceData.count("true")}件` +
                  `（${this.correctionDelaySec.toFixed(1)}秒後）`,
              );

              _startTime = performance.now();
              let currentTime = 0;
              this._recordSnapshot(0);

              try {
                while (queue.length > 0) {
                  const mode = await this._interceptLifecycle();
                  queue.sort((a, b) => a.at - b.at);
                  if (mode === "step") {
                    const stepEnd =
                      currentTime + STEP_TIME_MS / this.speedMultiplier;
                    if (queue[0].at > stepEnd) {
                      // queue.unshift(event);
                      this.runStatus = "paused";
                      continue;
                    }
                  }
                  const event = queue.shift();
                  if (!this.isSpreading) throw new Error("Aborted");
                  const delay = Math.max(0, event.at - currentTime);
                  if (!this.isPaused) await this._wait(delay);
                  currentTime = event.at;
                  const node = _nodes[event.id];

                  // const oldStat = this._applyInfo(node, event.type, event.isSource);
                  const oldAdoption = node.apply(
                    event.type,
                    event.sourceId,
                    (cur) => {
                      return (
                        cur.kind === "adopted" &&
                        cur.info === "false" &&
                        event.type === "true" &&
                        Math.random() <= this.correctionChance
                      );
                    },
                  );
                  // 訂正情報が拒否された場合もリンクを記録（試みた証跡）
                  if (
                    !oldAdoption &&
                    event.type === "true" &&
                    event.from != null
                  ) {
                    activeLinkMap.set(
                      event.from,
                      event.id,
                      "true",
                      event.sourceId,
                    );
                    _updateVisuals(this);
                  }
                  if (oldAdoption) {
                    updateStat(oldAdoption, node.adoption);
                    if (event.from != null) {
                      activeLinkMap.set(
                        event.from,
                        event.id,
                        event.type,
                        event.sourceId,
                      );
                    }
                    _pulseNode(node);
                    _updateVisuals(this);
                    node.neighbors.forEach((nid) => {
                      // const target = _nodes[nid];
                      if (visited[event.type].has(nid)) return;
                      // if (event.type === "false" && target.status !== "idle") return;
                      // if (event.type === "corrected" && target.status !== "idle" && target.status !== "false") return;
                      // const threshold = event.type === "false" ? this.misinfoProbability : this.correctionSpreadProbability;
                      if (Math.random() > prob[event.type]) return;
                      visited[event.type].add(nid);
                      queue.push({
                        id: nid,
                        from: event.id,
                        at:
                          currentTime +
                          (BASE_SPREAD_DELAY * (0.5 + Math.random())) /
                            this.speedMultiplier,
                        sourceId: event.sourceId,
                        type: event.type,
                      });
                    });
                  }
                  this._updateUiMetrics(
                    (performance.now() - _startTime) / 1000,
                  );
                  this._recordSnapshot((performance.now() - _startTime) / 1000);
                }
                this._finishSpread("シナリオ終了");
              } catch (e) {
                if (e.message !== "Aborted") console.error(e);
              }
            },

            async _interceptLifecycle() {
              if (!this.isSpreading) throw new Error("Aborted");
              while (this.isPaused) {
                if (_stepRequested) {
                  _stepRequested = false;
                  return "step";
                }
                await this._wait(80);
                if (!this.isSpreading) throw new Error("Aborted");
              }
              return "normal";
            },

            _wait(ms) {
              return new Promise((r) => setTimeout(r, ms));
            },
            _updateUiMetrics(currentTimeSec) {
              const total = this.userCount;
              const fp = Math.round((stat.false / total) * 100);
              const tp = Math.round((stat.true / total) * 100);
              const reached = total - stat.vacuous;
              const elapsed = (performance.now() - _startTime) / 1000;
              if (!_time50 && reached >= this.userCount * 0.5) {
                _time50 = { step: currentTimeSec, elapsed: currentTimeSec };
                writeLog(`⏱ 半数到達：${elapsed.toFixed(2)}秒`);
              }
              if (!_time90 && reached >= this.userCount * 0.9) {
                _time90 = { step: currentTimeSec, elapsed: currentTimeSec };
                writeLog(`⏱ 90%到達：${elapsed.toFixed(2)}秒`);
              }
              this.ui = {
                ...this.ui,
                barFalsePct: fp,
                barTruePct: tp,
                barIdlePct: Math.max(0, 100 - fp - tp),
              };
            },

            _resetUiMetrics() {
              _time50 = null;
              _time90 = null;
              this.ui = {
                barFalsePct: 0,
                barIdlePct: 100,
                barTruePct: 0,
              };
            },

            _finishSpread(label) {
              const dur = (performance.now() - _startTime) / 1000;
              if (!_time50) writeLog("⏱ 半数未到達");
              if (!_time90) writeLog("⏱ 90%未到達");
              this.runStatus = "finished";
              _updateVisuals(this);
              writeLog(`🏁 ${label}：計${dur.toFixed(2)}秒`);
            },

            _softResetStatuses() {
              this.runStatus = "none";
              _stepRequested = false;
              resetAdoption();
              this._resetUiMetrics();
              _graphData = [];
            },

            /**
             * @param {number} step
             */
            _recordSnapshot(step) {
              _graphData.push({ step, ...stat });
              _drawGraph(this.userCount, this.scenario);
            },

            legends() {
              if (this.scenario === "basic") {
                return [
                  ALL_LEGENDS.vacuous,
                  ALL_LEGENDS.influencer,
                  ALL_LEGENDS.plain,
                ];
              } else {
                return [
                  ALL_LEGENDS.vacuous,
                  ALL_LEGENDS.influencer,
                  ALL_LEGENDS.sourceFalse,
                  ALL_LEGENDS.sourceTrue,
                  ALL_LEGENDS.false,
                  ALL_LEGENDS.true,
                ];
              }
            },

            // ===== ユーティリティ =====
            /**
             * @param {int[]} excludeIds
             */
            _newSource(excludeIds) {
              const l = _nodes.length - excludeIds.length;
              let i = Math.floor(Math.random() * l);
              for (const id of excludeIds) {
                if (i >= id) {
                  i++;
                } else {
                  break;
                }
              }
              return i;
            },
          };
        }
        return { simulator, THEME_DOTS, applyTheme };
      })();
    </script>
