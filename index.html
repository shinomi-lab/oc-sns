<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SNS情報拡散シミュレーター</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <style>
      :root {
        --bg: #0f172a;
        --surface: #1e293b;
        --panel: #334155;
        --line: #475569;
        --line-soft: #64748b;
        --text: #f8fafc;
        --muted: #cbd5e1;
        --subtle: #94a3b8;
        --accent: #22d3ee;
        --accent-dark: #0891b2;
        --info: #22d3ee;
        --source: #facc15;
        --false: #ef4444;
        --corrected: #22c55e;
        --idle: #475569;
        --influencer: #a855f7;
        --source-basic: var(--source);
        --source-false: #fca5a5;
        --source-true: #86efac;
        --shadow:
          0 20px 25px -5px rgb(0 0 0 / 0.5), 0 8px 10px -6px rgb(0 0 0 / 0.5);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP",
          sans-serif;
        overflow: hidden;
      }
      .app {
        display: grid;
        grid-template-columns: 360px 1fr;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }
      .sidebar {
        background: var(--surface);
        border-right: 1px solid var(--line);
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        overflow-y: auto;
        box-shadow: 4px 0 24px rgba(0, 0, 0, 0.3);
        z-index: 10;
      }
      header h1 {
        margin: 0;
        color: var(--accent);
        font-size: 17px;
        font-weight: 800;
        letter-spacing: -0.3px;
      }
      header .subtitle {
        margin: 3px 0 0;
        color: var(--subtle);
        font-size: 12px;
      }
      .section-title {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: var(--subtle);
        margin: 4px 0 2px;
        font-weight: 700;
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        /*padding-bottom: 4px;*/
      }
      .config-panel {
        background: rgba(15, 23, 42, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 12px;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 9px;
      }
      .item-field {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .item-label-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .item-label-row span {
        font-size: 14px;
        font-weight: 600;
      }
      .item-label-left {
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .item-value {
        color: var(--accent);
        font-weight: 700;
      }
      .warn-icon {
        display: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #f59e0b;
        color: #000;
        font-size: 9px;
        font-weight: 900;
        align-items: center;
        justify-content: center;
        cursor: default;
        position: relative;
      }
      .warn-icon.visible {
        display: flex;
      }
      .warn-icon .tooltip {
        display: none;
        position: absolute;
        bottom: 18px;
        right: 0;
        background: #1e293b;
        border: 1px solid #f59e0b;
        border-radius: 5px;
        padding: 4px 7px;
        font-size: 10px;
        color: var(--text);
        white-space: nowrap;
        z-index: 100;
        font-weight: 600;
      }
      .warn-icon:hover .tooltip {
        display: block;
      }
      .slider {
        width: 100%;
        height: 5px;
        background: #0f172a;
        border-radius: 3px;
        outline: none;
        -webkit-appearance: none;
        cursor: pointer;
        margin: 4px 0;
      }
      .slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 13px;
        height: 13px;
        border-radius: 50%;
        background: var(--accent);
      }
      .slider:disabled {
        opacity: 0.2;
        cursor: not-allowed;
      }
      /* タブ */
      .tab-content {
        border-radius: 0 0 4px 4px;
        border: 1px solid var(--line-soft);
        display: flex;
        flex-direction: column;
        gap: 9px;
        padding: 10px;
      }
      .segmented {
        display: flex;
        flex-direction: row;
      }
      .segmented button {
        flex: 1;
        border: 1px solid var(--line-soft);
        border-bottom: 0;
        border-radius: 4px 4px 0 0;
        background: #0f172a;
        color: var(--muted);
        padding: 7px 10px;
        text-align: center;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        position: relative;
      }
      .segmented button[aria-pressed="true"] {
        background: var(--accent-dark);
        color: #fff;
        border-color: var(--accent);
      }
      .actions-row {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 5px;
        margin-top: 2px;
      }
      .btn {
        min-height: 32px;
        border: 1px solid transparent;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 150ms ease;
        font-family: inherit;
      }
      .btn-primary {
        background: var(--accent-dark);
        color: #fff;
      }
      .btn-primary:hover:not(:disabled) {
        background: #06738d;
      }
      .btn-abort {
        background: rgba(239, 68, 68, 0.2);
        border-color: var(--false);
        color: #fca5a5;
      }
      .btn-abort:hover:not(:disabled) {
        background: rgba(239, 68, 68, 0.35);
      }
      .btn-secondary {
        background: #0f172a;
        border-color: var(--line);
        color: var(--muted);
      }
      .btn-secondary:hover:not(:disabled) {
        background: rgba(255, 255, 255, 0.05);
      }
      .btn-step {
        background: rgba(34, 211, 238, 0.1);
        border-color: var(--accent);
        color: var(--accent);
      }
      .btn-step:hover:not(:disabled) {
        background: rgba(34, 211, 238, 0.2);
      }
      .btn:disabled {
        opacity: 0.2;
        cursor: not-allowed;
      }
      /* 発信源コントロール */
      .source-control-row {
        display: flex;
        align-items: center;
        gap: 4px;
        flex-wrap: wrap;
      }
      .source-label {
        font-size: 12px;
        font-weight: 600;
      }
      .item-label-left > .basic {
        color: var(--source-basic);
      }
      .item-label-left > .false {
        color: var(--source-false);
      }
      .item-label-left > .true {
        color: var(--source-true);
      }
      .item-value.basic {
        color: var(--source-basic);
      }
      .item-value.false {
        color: var(--source-false);
      }
      .item-value.true {
        color: var(--source-true);
      }
      .source-badge {
        font-size: 12px;
        font-weight: 700;
        padding: 2px 7px;
        border-radius: 10px;
        white-space: nowrap;
        border: 1px solid;
      }
      .source-badge.basic-badge {
        background: rgba(250, 204, 21, 0.15);
        border-color: rgba(250, 204, 21, 0.4);
        color: var(--source);
      }
      .source-badge.false-badge {
        background: rgba(239, 68, 68, 0.12);
        border-color: rgba(239, 68, 68, 0.4);
        color: var(--source-false);
      }
      .source-badge.true-badge {
        background: rgba(34, 197, 94, 0.12);
        border-color: rgba(34, 197, 94, 0.4);
        color: var(--source-true);
      }
      .source-btn {
        flex-grow: 1;
        justify-content: center;
        min-height: 22px;
        padding: 4px 7px;
        border-radius: 5px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        border: 1px solid var(--line);
        background: #0f172a;
        color: var(--muted);
        font-family: inherit;
        display: flex;
        align-items: center;
        transition: all 150ms;
      }
      .source-btn:hover:not(:disabled) {
        background: rgba(255, 255, 255, 0.07);
        color: #fff;
      }
      .source-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      .warn-text {
        font-size: 10px;
        color: #f59e0b;
        margin-top: 2px;
        display: none;
      }
      .warn-text.visible {
        display: block;
      }
      /* 統計 */
      .metrics-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 5px;
      }
      .metric-card {
        background: rgba(15, 23, 42, 0.4);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 5px 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .metric-card strong {
        display: block;
        font-size: 16px;
        color: #fff;
      }
      .metric-card span {
        display: block;
        font-size: 12px;
        color: var(--subtle);
        margin-top: 1px;
        flex-grow: 2;
      }
      /* ログ */
      .log-panel {
        flex: 1;
        min-height: 60px;
        max-height: 120px;
        background: #0f172a;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 5px 7px;
        font-size: 10px;
        color: var(--muted);
        overflow-y: auto;
        line-height: 1.5;
      }
      .log-panel div + div {
        margin-top: 2px;
      }
      /* メインエリア */
      .main-area {
        position: relative;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle at 50% 50%,
          #1a2744 0%,
          #0f172a 100%
        );
      }
      svg#network {
        width: 100%;
        height: 100%;
        display: block;
        cursor: grab;
      }
      svg#network:active {
        cursor: grabbing;
      }
      /* D3要素 */
      .link {
        stroke: #64748b;
        stroke-opacity: 0.25;
        stroke-width: 1;
      }
      .link.false {
        stroke: var(--false);
        stroke-opacity: 0.8;
        stroke-width: 2;
      }
      .link.info {
        stroke: var(--info);
        stroke-opacity: 0.8;
        stroke-width: 2;
      }
      .link.corrected {
        stroke: var(--corrected);
        stroke-opacity: 0.8;
        stroke-width: 2;
      }
      .link.influencer {
        stroke: var(--source);
        stroke-opacity: 0.3;
      }
      .node {
        stroke: #0f172a;
        stroke-width: 1.5;
        cursor: pointer;
      }
      .node.idle {
        fill: var(--idle);
      }
      .node.info {
        fill: var(--info);
      }
      .node.false {
        fill: var(--false);
      }
      .node.corrected {
        fill: var(--corrected);
      }
      .node.influencer {
        stroke: var(--influencer);
        stroke-width: 2.5;
      }
      .node.source-basic {
        stroke: var(--source);
        stroke-width: 3;
      }
      .node.source-false {
        stroke: var(--false);
        stroke-width: 3;
      }
      .node.source-true {
        stroke: var(--corrected);
        stroke-width: 3;
      }
      .node.highlighted {
        stroke: #fff !important;
        stroke-width: 3 !important;
      }
      .speed-label {
        font-size: 12px;
        fill: rgba(255, 255, 255, 0.7);
        pointer-events: none;
        font-family: monospace;
        font-weight: 700;
        user-select: none;
      }
      /* ズームUI */
      .zoom-controls {
        position: absolute;
        top: 14px;
        right: 14px;
        display: flex;
        flex-direction: column;
        gap: 3px;
        background: rgba(15, 23, 42, 0.75);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 3px;
        backdrop-filter: blur(4px);
      }
      .zoom-btn {
        width: 26px;
        height: 26px;
        background: transparent;
        border: 0;
        color: #fff;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .zoom-btn:hover {
        background: rgba(255, 255, 255, 0.1);
      }
      /* 凡例 */
      .legend-overlay {
        position: absolute;
        left: 14px;
        bottom: 14px;
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid var(--line);
        border-radius: 7px;
        padding: 8px 10px;
        backdrop-filter: blur(4px);
        pointer-events: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .legend-items {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .legend-item {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
      }
      .swatch {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .swatch.idle {
        background: var(--idle);
      }
      .swatch.influencer {
        background: var(--influencer);
        border: 1.5px solid #fff;
      }
      .swatch.false {
        background: var(--false);
      }
      .swatch.corrected {
        background: var(--corrected);
      }
      .swatch.info {
        background: var(--info);
      }
      .swatch.source {
        background: var(--source);
        border: 1.5px solid #fff;
      }
      .swatch.source-false {
        background: var(--false);
        border: 2px solid #fff;
        border-radius: 2px;
      }
      .swatch.source-true {
        background: var(--corrected);
        border: 2px solid #fff;
        border-radius: 2px;
      }
      .legend-divider {
        border: none;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        margin: 0;
      }
      .legend-speed-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .legend-speed-label {
        font-size: 12px;
        color: var(--subtle);
        font-weight: 700;
      }
      .speed-items {
        display: flex;
        gap: 8px;
      }
      .speed-item {
        font-size: 12px;
        color: var(--muted);
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 3px;
      }
      .speed-arrow {
        font-family: monospace;
        font-size: 14px;
        font-weight: 700;
      }
      .legend-toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        user-select: none;
      }
      .toggle-checkbox {
        width: 12px;
        height: 12px;
        accent-color: var(--accent);
        cursor: pointer;
      }
      .legend-toggle-label {
        font-size: 12px;
        color: var(--subtle);
        font-weight: 600;
      }
      /* バランスメータ */
      .balance-float {
        position: absolute;
        background: rgba(15, 23, 42, 0.82);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 14px;
        backdrop-filter: blur(6px);
        visibility: hidden;
        cursor: grab;
        z-index: 5;
        width: 300px;
      }
      .balance-float.active {
        visibility: visible;
      }
      .balance-float:active {
        cursor: grabbing;
      }
      .balance-bar {
        display: flex;
        height: 10px;
        border-radius: 5px;
        overflow: hidden;
        background: rgba(71, 85, 105, 0.3);
      }
      .bar-false {
        background: var(--false);
        transition: width 200ms ease;
      }
      .bar-idle {
        background: rgba(100, 116, 139, 0.25);
        transition: width 200ms ease;
      }
      .bar-true {
        background: var(--corrected);
        transition: width 200ms ease;
      }
      .balance-nums {
        display: flex;
        justify-content: space-between;
        margin-top: 5px;
        font-size: 12px;
        font-weight: 700;
      }
      /* ライブインフォパネル */
      .live-panel {
        position: absolute;
        width: 460px;
        min-width: 280px;
        background: rgba(23, 33, 50, 0.88);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(8px);
        display: flex;
        flex-direction: column;
        z-index: 5;
        overflow: auto;
      }
      .live-panel.minimized {
        overflow: hidden;
      }
      .panel-header {
        background: rgba(15, 23, 42, 0.6);
        padding: 7px 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        font-size: 12px;
        font-weight: 700;
        cursor: grab;
        flex-shrink: 0;
        border-radius: 8px 8px 0 0;
      }
      .panel-header:active {
        cursor: grabbing;
      }
      .panel-controls {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .opacity-label {
        font-size: 9px;
        color: var(--subtle);
      }
      .opacity-slider {
        width: 50px;
        height: 4px;
        accent-color: var(--accent);
        cursor: pointer;
      }
      .panel-toggle-btn {
        background: transparent;
        border: 0;
        color: var(--subtle);
        cursor: pointer;
        font-size: 13px;
        font-weight: 800;
        line-height: 1;
      }
      .panel-toggle-btn:hover {
        color: #fff;
      }
      .panel-body {
        padding: 4px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex: 1;
        min-height: 120px;
      }
      .panel-body svg {
        flex: 1;
        min-height: 80px;
      }
      .minimized .panel-body {
        display: none;
      }
      /* コンテキストメニュー */
      .node-context-menu {
        position: fixed;
        background: #1e293b;
        border: 1px solid var(--line-soft);
        border-radius: 8px;
        box-shadow: var(--shadow);
        padding: 5px;
        z-index: 200;
        flex-direction: column;
        gap: 2px;
        min-width: 170px;
      }
      .menu-header {
        font-size: 12px;
        color: var(--subtle);
        font-weight: 800;
        padding: 3px 7px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        margin-bottom: 3px;
      }
      .menu-section-label {
        font-size: 10px;
        color: var(--subtle);
        padding: 3px 7px 1px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .menu-item {
        background: transparent;
        border: 0;
        color: var(--muted);
        text-align: left;
        padding: 5px 7px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        border-radius: 4px;
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: inherit;
        width: 100%;
      }
      .menu-item:hover {
        background: var(--accent-dark);
        color: #fff;
      }
      .menu-separator {
        border: none;
        border-top: 1px solid rgba(255, 255, 255, 0.07);
        margin: 3px 0;
      }
      .axis line,
      .axis path {
        stroke: rgba(255, 255, 255, 0.08);
      }
      /* Alpine cloak */
      [x-cloak] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <!--
      Alpine.jsのx-dataルートは<body>に置く。
      D3が管理するSVG領域（#network, #graphSvg）はAlpineのテンプレート外として扱い、
      Alpine側からは触らない。凡例(#legendItems)のみJS側でinnerHTMLを更新する（D3と同じ理由）。
    -->
    <div x-data="simulator()" x-init="init()">
      <div class="app">
        <aside class="sidebar">
          <header>
            <h1>SNS情報拡散シミュレーション</h1>
            <!--<p class="subtitle">ネットワーク上での情報の広がりを見てみよう</p>-->
          </header>

          <div class="section-title">ネットワーク</div>
          <div class="config-panel">
            <div class="item-field">
              <div class="item-label-row">
                <span>ユーザー数</span>
                <span class="item-value" x-text="userCount + '人'"></span>
              </div>
              <input
                type="range"
                id="userCountInput"
                min="20"
                max="600"
                value="250"
                class="slider"
                :disabled="isSpreading"
                x-model.number="userCount"
                @change="regenerateNetwork()"
              />
            </div>
            <!--<div class="item-field">
              <div class="item-label-row">
                <span>繋がりのレベル</span>
                <span class="item-value" x-text="mParam"></span>
              </div>
              <input
                type="range"
                id="mInput"
                min="1"
                max="10"
                value="2"
                class="slider"
                :disabled="isSpreading"
                x-model.number="mParam"
              />
            </div>-->
            <button
              type="button"
              class="btn btn-secondary"
              id="regenerateButton"
              style="width: 100%; font-weight: 800; font-size: 11px"
              :disabled="isSpreading"
              @click="regenerateNetwork()"
            >
              ネットワークを再生成
            </button>
          </div>

          <div class="section-title">シナリオ</div>
          <div class="config-panel">
            <div class="item-field">
              <div class="item-label-row">
                <span>インフルエンサー人数</span>
                <span
                  class="item-value"
                  x-text="influencerCount + '人'"
                ></span>
              </div>
              <input
                type="range"
                id="influencerCountInput"
                min="1"
                :max="Math.min(20, userCount)"

      <template x-if="contextMenu">
        <div

          :style="{left: `${contextMenu.x}px`, top: `${contextMenu.y}px`}"

    <script>
      /**
        * @typedef {"basic" | "false" | "true"} Source
        *
        * @typedef {"basic" | "correction"} Scenario
        */

      const SPEED_PATTERNS = [
        { label: "最速", arrow: "↑", ms: 160, color: "#f472b6" },
        { label: "早い", arrow: "↗", ms: 240, color: "#fb923c" },
        { label: "普通", arrow: "→", ms: 320, color: "#facc15" },
        { label: "遅い", arrow: "↘", ms: 400, color: "#60a5fa" },
        { label: "最遅", arrow: "↓", ms: 500, color: "#818cf8" },
      ];
      const SPEED_DIST_WEIGHTS = [0.35, 0.28, 0.2, 0.11, 0.06];
      const BASE_SPREAD_DELAY = 500;
      const STEP_TIME_MS = 1000;

      const INFO_PROPS = {
        basic: {
          name: "",
        },
        false: {
          name: "デマ",
        },
        true: {
          name: "訂正",
          longName: "訂正情報",
        },
      };

      /**
       * @type{Record<Source, {icon: string, name: string}>}
       */
      const SOURCE_PROPS = {
        basic: {
          icon: "🏁",
          name: `${INFO_PROPS.basic.name}発信源`,
        },
        false: {
          icon: "🔴",
          name: `${INFO_PROPS.false.name}発信源`,
        },
        true: {
          icon: "🟢",
          name: `${INFO_PROPS.true.longName}発信源`,
        }
      }

      /**
       * @type {{kind: Scenario; label: string}[]}
       */
      const SCENARIO_TABS = [
        {
          kind: "basic",
          label: "単純な情報拡散",
        },
        {
          kind: "correction",
          label: `${INFO_PROPS.false.name} vs ${INFO_PROPS.true.name}`,
        },
      ];

      const ALL_LEGENDS = {
        idle: { kind: "idle", label: "未到達" },
        influencer : { kind: "influencer", label: "インフルエンサー" },
        info: { kind: "info", label: "情報を受け取った" },
        idle: { kind: "idle", label: "未到達" },
        influencer: { kind: "influencer", label: "インフルエンサー" },
        source: { kind: "source", label: SOURCE_PROPS.basic.name },
        sourceFalse: { kind: "source-false", label: SOURCE_PROPS.false.name },
        sourceTrue: { kind: "source-true", label: SOURCE_PROPS.true.name },
        false: { kind: "false", label: `${INFO_PROPS.false.name}を信じた` },
        corrected: { kind: "corrected", label: `${INFO_PROPS.true.longName}を信じた` },
      };

      // Alpine コンポーネント定義
      function simulator() {
        /**
          * @typedef {"idle" | "info" | "false" | "corrected"} Status
          */
        /**
        * @typedef {Object} Node
        * @property {number} id
        * @property {Set<number>} outNeighbors
        * @property {Set<number>} inNeighbors
        * @property {number} [x]
        * @property {number} y
        * @property {number} vx
        * @property {number} vy
        * @property {bool} isInfluencer
        * @property {number} speedIndex
        * @property {Source} [source]
        * @property {bool} isHighlighted
        * @property {Status} status
        * @property {readonly number} degree
        * @property {readonly number[]} neighbors
        */

        /**
         * @typedef {Object} Link
         * @property {number} source
         * @property {number} target
         */

        /**
        * @typedef {Object} SliderParams
        * @property {string} label
        * @property {readonly string} valueLabel
        * @property {number} min
        * @property {number} max
        * @property {number} step
        * @property {number} value
        * @property {readonly number} into
        */

        /** @type {SliderParams} */
        const basicInfoSlider = {
          min: 0,
          max: 100,
          step: 5,
          value: 50,
          get valueLabel() { return this.value + '%'; },
          get into() { return this.value / 100; },
          label: "情報の伝わりやすさ",
        };
        /** @type {SliderParams} */
        const misInfoSlider = {
          min: 0,
          max: 100,
          step: 5,
          value: 80,
          get valueLabel() { return this.value + '%'; },
          get into() { return this.value / 100; },
          label: `${INFO_PROPS.false.name}の伝わりやすさ`,
        };
        /** @type {SliderParams} */
        const trueInfoSlider = {
          min: 0,
          max: 100,
          step: 5,
          value: 60,
          get valueLabel() { return this.value + '%'; },
          get into() { return this.value / 100; },
          label: `${INFO_PROPS.true.longName}の伝わりやすさ`,
        };
        /** @type {SliderParams} */
        const correctChanceSlider = {
          min: 0,
          max: 100,
          step: 5,
          value: 40,
          get valueLabel() { return this.value + '%'; },
          get into() { return this.value / 100; },
          label: `${INFO_PROPS.true.longName}を受け入れる確率`,
        };
        /** @type {SliderParams} */
        const trueInfoDelaySlider = {
          min: 0,
          max: 12,
          step: 1,
          value: 4,
          get into() { return this.value / 4; },
          get valueLabel() { return this.into.toFixed(2) + '秒後'; },
          label: `${INFO_PROPS.true.longName}の発信タイミング`,
        };

        /**
        * @type { Node[] }
        */
        let _nodes = [];
        /**
        * @type { Link[] }
        */
        let _links = [];
        /**
         * @type { Node[] }
         */
        let _sortedNodes = [];


        /**
         * @type {Record<Status,number>}
         */
        const stat = {
          idle: 0,
          info: 0,
          false: 0,
          corrected: 0,
        };


        /**
         * @param { number } id
         * @returns { Node }
         */
        function newNode(id) {
          return {
            id,
            outNeighbors: new Set(),
            inNeighbors: new Set(),
            isInfluencer: false,
            speedIndex: 0,
            source: undefined,
            isHighlighted: false,
            status: "idle",
            get degree() {
              return this.inNeighbors.size + this.outNeighbors.size;
            },
            get neighbors() {
              return [...this.inNeighbors, ...this.outNeighbors];
            }
          }
        }
        /**
         * @param { number } n
         * @param { number } m
         * @param { () => number } random
         */
        function generateBA(n, m, random) {
          const mClamped = Math.min(m, n - 1);
          /** @type { Node[] } */
          const nodes = d3.range(n).map(newNode);
          /** @type { Link[] } */
          const links = [];

          /**
           *  @param { number } a
           *  @param { number } b
          */
          const addLink = (a, b) => {
            if (a === b) return;
            if (nodes[a].outNeighbors.has(b)) {
              return;
            }
            links.push({ source: a, target: b });
            nodes[a].outNeighbors.add(b);
            nodes[b].inNeighbors.add(a);
          };

          const initSize = Math.min(mClamped + 1, n);
          for (let i = 0; i < initSize; i++) {
            for (let j = i + 1; j < initSize; j++) {
              addLink(i, j);
            }
          }

          for (let i = initSize; i < n; i++) {
            const targets = new Set();
            let attempts = 0;
            while (
              targets.size < Math.min(mClamped, i) &&
              attempts < mClamped * 20
            ) {
              attempts++;
              let r = random() * (links.length * 2 || 1),
                cumul = 0;
              for (let j = 0; j < i; j++) {
                cumul += nodes[j].degree;
                if (r <= cumul && !targets.has(j)) {
                  targets.add(j);
                  break;
                }
              }
            }
            targets.forEach((t) => addLink(t, i));
          }
          _nodes = nodes;
          _links = links;
          _sortedNodes = [..._nodes].sort((a, b) => b.degree - a.degree);
        }

        return {
          // ===== Alpine リアクティブ状態（UI表示に関わるもの） =====
          /**
           * @type {Scenario}
           */
          scenario: "basic",
          userCount: 100,
          mParam: 1,
          influencerCount: 2,

          speedSlider: 100,
          speedMultiplier: 1.0,
          showSpeedIcons: true,
          /**
           * @type { "none" | "running" | "paused" | "finished" }
           */
          runStatus: "none",
          panelMinimized: false,
          // UI表示用まとめオブジェクト（統計・バランスメータ）
          ui: {
            reached: "0%",
            falseCount: "0人",
            trueCount: "0人",
            time50: "--",
            time90: "--",
            done: "--",
            barFalsePct: 0,
            barIdlePct: 100,
            barTruePct: 0,
          },
          /**
           * @type {{
           *  node: Node,
           * } | null}
           */
          contextMenu: null,

          get scenarioTabs() {
            return SCENARIO_TABS;
          },

          sliders() {
            if (this.scenario === "basic") {
              return [basicInfoSlider];
            } else {
              return [misInfoSlider, trueInfoSlider, trueInfoDelaySlider, correctChanceSlider];
            }
          },

          // スライダー値の変換後の値のゲッター（変換は各スライダーパラメータで定義）
          get basicSpreadProbability() {
            return basicInfoSlider.into;
          },
          get misinfoProbability() {
            return misInfoSlider.into;
          },
          get correctionSpreadProbability() {
            return misInfoSlider.into;
          },
          get correctionChance() {
            return correctChanceSlider.into;
          },
          get correctionDelaySec() {
            return trueInfoDelaySlider.into;
          },

          /**
            * @type {Record<Source, number[]>}
            */
          sourceIds: {
            basic: [],
            false: [],
            true: [],
          },

          /**
           * @typedef {Object} SourceInfo
           * @property {Source} kind
           * @property {string} label
           * @property {readonly number} count
           */

           /**
            * @param {Source} kind
            * @returns {SourceInfo}
            */
           _sourceInfo(kind) {
             const count = this.sourceIds[kind].length;
             return {
               kind,
               label: SOURCE_PROPS[kind]?.longName ?? SOURCE_PROPS[kind].name,
               count,
             };
           },

          /**
           * @returns {SourceInfo[]}
           */
          get availableSources() {
            if (this.scenario === "basic") {
              return [this._sourceInfo("basic")];
            } else {
              return [this._sourceInfo("false"), this._sourceInfo("true")];
            }
          },
          get maxSourceCount() {
            return Math.ceil(this.userCount * 0.05);
          },

          _activeLinkKeys: new Set(),
          _simulation: null,
          _nodeSelection: null,
          _linkSelection: null,
          _labelSelection: null,
          _startTime: 0,
          _time50: null,
          _time90: null,
          _graphData: [],
          _seed: 42,
          _stepRequested: false,

          get isRunnable() {
            return (this.runStatus === "none" &&
              (this.scenario === "basic" && this.sourceIds.basic.length > 0)
              || (this.scenario === "correction" &&
                this.sourceIds.false.length + this.sourceIds.true.length > 0)
            );
          },
          get isSpreading() {
            return this.runStatus === "running" || this.runStatus === "paused";
          },
          get isPaused() {
            return this.runStatus === "paused";
          },
          get isFinished() {
            return this.runStatus === "finished";
          },

          // ===== Alpine init =====
          init() {
            this._buildNetwork();
            this._renderNetwork();
            this._resetStat();
            this._setupContextMenu();

            this._setFloatingPanelPositions();
            this._setupDrag();

            this._setupResizeObserver();
            window.addEventListener("resize", () => {
              if (!this.isSpreading) this._renderNetwork();
            });
            this._writeLog(
              "シミュレーターを起動しました。ノードを右クリックで操作できます。",
            );
          },

          speedLabels() {
            return SPEED_PATTERNS.map((p) => ({
              label: `${p.arrow} ${p.label}`,
            }));
          },

          speedPatterns() {
            return SPEED_PATTERNS;
          },
          _speedLabel(index) {
            const p = SPEED_PATTERNS[index];
            return `${p.arrow} ${p.label}`;
          },

          // ===== シナリオ切り替え =====
          setScenario(scenario) {
            if (this.isSpreading) return;
            this.scenario = scenario;
            this._clearAllSources();
            this._softResetStatuses();
            // balanceFloatの位置をシナリオ切り替え後に再設定
            this.$nextTick(() => this._setFloatingPanelPositions());
            this._writeLog(
              scenario === "basic"
                ? "通常の情報拡散シナリオ"
                : `${INFO_PROPS.false.name} vs ${INFO_PROPS.true.longName} シナリオ`,
            );
          },

          // ===== ネットワーク操作 =====
          regenerateNetwork() {
            if (this.isSpreading) return;
            this._seed += 1;
            _nodes.forEach((n) => {
              n.x = undefined;
              n.y = undefined;
              n.vx = 0;
              n.vy = 0;
            });
            this._buildNetwork();
            this._renderNetwork();
            this._resetStat();
            this._graphData = [];
            this._drawGraph();
            this._writeLog("ネットワークを再生成しました");
          },

          // ===== 発信源操作 =====
          _clearSource(kind) {
            this.sourceIds[kind].forEach((id) => {
              _nodes[id].source = undefined;
            });
            this.sourceIds[kind] = [];
          },
          _clearAllSources() {
            this._clearSource("basic");
            this._clearSource("false");
            this._clearSource("true");
          },
          /**
           * @param {Source} kind
           */
          removeSource(kind) {
            const id = this.sourceIds[kind].pop();
            _nodes[id].source = undefined;
            this._updateVisuals();
            this._writeLog(`ノード${id}の${SOURCE_PROPS[kind].name}を解除しました`);
          },
          clearSource(kind) {
            this._clearSource(kind);
            this._updateVisuals();
            this._writeLog(`${SOURCE_PROPS[kind].name}をリセットしました`);
          },
          addRundomSource(kind) {
            let id;
            switch (kind) {
              case "basic":
                id = this._newSource([...this.sourceIds.basic]);
                break;
              case "false":
                id = this._newSource([...this.sourceIds.false, ...this.sourceIds.true]);
                break;
              case "true":
                id = this._newSource([...this.sourceIds.true, ...this.sourceIds.false]);
                break;
              default:
                return;
            }
            this.sourceIds[kind].push(id);
            _nodes[id].source = kind;
            this._updateVisuals();
            this._writeLog(`${SOURCE_PROPS[kind].name}をランダムで1つ追加しました`);
          },
          toggleSource(itemSource) {
            const node = this.contextMenu.node;
            if (node.source === itemSource) {
              this.sourceIds[itemSource] = this.sourceIds[itemSource].filter((id) => id === node.id);
              node.source = undefined;
              this._writeLog(
                `ノード${node.id}の${SOURCE_PROPS[itemSource].name}を解除しました`,
              );
            } else {
              if (node.source != null) {
                this.sourceIds[node.source] = this.sourceIds[node.source].filter((id) => id === node.id);
                node.source = undefined;
                this._writeLog(
                  `ノード${node.id}の${SOURCE_PROPS[node.source].name}を解除しました`,
                );
              }
              this.sourceIds[itemSource].push(node.id);
              node.source = itemSource;
              this._writeLog(
                `ノード${node.id}を${SOURCE_PROPS[itemSource].name}に設定しました`,
              );
            }
            this._closeContextMenu();
          },

          onInfluencerCountChange() {
            this._updateInfluencers();
            this._updateVisuals();
          },

          // ===== シミュレーション制御 =====
          handleStart() {
            if (this.isSpreading) {
              return;
            }
            // this._softResetStatuses();
            this.runStatus = "running";
            if (this.scenario === "basic") {
              const srcs =
                this.sourceIds.basic.length > 0
                  ? [...this.sourceIds.basic]
                  : [this._getDefaultStartNodeId()];
              this._startBasicScenario(srcs);
            } else {
              this._startCorrectionScenario();
            }
            // this._drawGraphFrame();
          },
          handleAbortOrReset() {
            let msg;
            if (this.isSpreading) {
              msg = "■ 中断しました";
            } else if (this.isFinished) {
              msg = "リセットしました";
            } else {
              return;
            }
            this._softResetStatuses();
            this._writeLog(msg);
          },

          handlePauseOrResume() {
            if (this.runStatus === "running") {
              this.runStatus = "paused";
              this._writeLog("一時停止");
            } else if ( this.isPaused) {
              this.runStatus = "running";
              this._writeLog("再開");
            }
          },

          handleStep() {
            if (this.isPaused) {
              this._stepRequested = true;
            }
          },

          _seededRandom(seed) {
            let v = seed % 2147483647;
            if (v <= 0) v += 2147483646;
            return () => {
              v = (v * 16807) % 2147483647;
              return (v - 1) / 2147483646;
            };
          },

          _randomSpeed() {
            const r = Math.random();
            let cumul = 0;
            for (let i = 0; i < SPEED_DIST_WEIGHTS.length; i++) {
              cumul += SPEED_DIST_WEIGHTS[i];
              if (r <= cumul) {
                return i;
              }
            }
            return SPEED_DIST_WEIGHTS.length - 1;
          },
          _shuffleSpeeds() {
            _nodes.forEach((node) => {
              node.speedIndex = this._randomSpeed();
            });
          },
          _prevInfCnt: 0,
          _updateInfluencers() {
            for (const [index, node] of _sortedNodes.entries()) {
              if (index < this.influencerCount) {
                node.isInfluencer = true;
                node.speedIndex = 0;
              } else if (index < this._prevInfCnt) {
                node.isInfluencer = false;
                node.speedIndex = this._randomSpeed();
              } else {
                break;
              }
            }
            this._prevInfCnt = this.influencerCount;
          },
          _buildNetwork() {
            generateBA(
              this.userCount,
              this.mParam,
              this._seededRandom(this._seed),
            );
            this._activeLinkKeys.clear();
            this._clearAllSources();
            this._shuffleSpeeds();
            this._updateInfluencers();
          },

          _renderNetwork() {
            const svgEl = document.getElementById("network");
            const width = svgEl.clientWidth || 800;
            const height = svgEl.clientHeight || 600;

            // ノード間の距離を制御するパラメータ
            let linkDist = 50;
            let repulsion = -100;
            let colRadius = 20;
            // if (this.userCount > 300) {
            //   linkDist = 50;
            //   repulsion = -100;
            //   colRadius = 10;
            // } else if (this.userCount > 200) {
            //   linkDist = 60;
            //   repulsion = -180;
            //   colRadius = 14;
            // } else if (this.userCount > 100) {
            //   linkDist = 70;
            //   repulsion = -180;
            //   colRadius = 14;
            // } else if (this.userCount > 50) {
            //   linkDist = 50;
            //   repulsion = -100;
            //   colRadius = 10;
            // } else {
            //   linkDist = 100;
            //   repulsion = -260;
            //   colRadius = 18;
            // }

            const svg = d3.select("#network");
            if (svg.node().__zoom) svg.node().__zoom = d3.zoomIdentity;
            svg.selectAll("*").remove();

            const zoomGroup = svg.append("g").attr("class", "zoom-container");
            const zoomBehavior = d3
              .zoom()
              .scaleExtent([0.1, 10])
              .on("zoom", (e) => zoomGroup.attr("transform", e.transform));
            svg.call(zoomBehavior);
            this._zoomBehavior = zoomBehavior;
            this._zoomSvg = svg;

            // d3だとホイールが効かない領域があるため、mainのイベントを委譲する
            document.getElementById("main").addEventListener("wheel", e => {
              if (!e.isTrusted) return;
              e.preventDefault();
              svgEl.dispatchEvent(new WheelEvent("wheel", e));
            }, { passive: false });

            const jitter = this._seededRandom(this._seed + 999);
            _nodes.forEach((n) => {
              if (n?.x === undefined) {
                n.x = width / 2 + (jitter() - 0.5) * linkDist;
                n.y = height / 2 + (jitter() - 0.5) * linkDist;
              }
            });

            this._linkSelection = zoomGroup
              .append("g")
              .attr("class", "links")
              .selectAll("line")
              .data(_links)
              .enter()
              .append("line");
              // .attr(
              //   "class",
              //   (d) => "link" + (this._isInfluencerLink(d) ? " influencer" : ""),
              // );

            const nodeG = zoomGroup.append("g").attr("class", "nodes");
            const nodeEnter = nodeG
              .selectAll("g.node-g")
              .data(_nodes)
              .enter()
              .append("g")
              .attr("class", "node-g");

            this._nodeSelection = nodeEnter
              .append("circle")
              .attr("class", (d) => this._nodeClass(d.id))
              .attr("r", (d) => this._nodeRadius(d))
              .on("contextmenu", (event, d) => {
                event.preventDefault();
                this._updateContextMenu(event, _nodes[d.id]);
                this._updateVisuals();
              })
              .call(
                d3
                  .drag()
                  .on("start", (event, d) => {
                    if (!event.active && this._simulation)
                      this._simulation.alphaTarget(0.2).restart();
                    d.fx = d.x;
                    d.fy = d.y;
                  })
                  .on("drag", (event, d) => {
                    if (this.isSpreading) return;
                    d.fx = event.x;
                    d.fy = event.y;
                  })
                  .on("end", (event, d) => {
                    if (!event.active && this._simulation)
                      this._simulation.alphaTarget(0);
                    d.fx = null;
                    d.fy = null;
                  }),
              );

            this._labelSelection = nodeEnter
              .append("text")
              .attr("class", "speed-label")
              .attr("text-anchor", "middle")
              .attr("dy", (d) => -(this._nodeRadius(d) + 3))
              .text((d) =>
                this.showSpeedIcons ? SPEED_PATTERNS[d.speedIndex].arrow : "",
              )
              .style("fill", (d) => SPEED_PATTERNS[d.speedIndex].color);

            if (this._simulation) this._simulation.stop();

            this._simulation = d3
              .forceSimulation(_nodes)
              .alphaDecay(0.04)
              .alphaMin(0.001)
              .velocityDecay(0.45)
              .force(
                "link",
                d3
                  .forceLink(_links)
                  .id((d) => d.id)
                  .distance(linkDist)
                  .strength(0.3),
              )
              .force(
                "charge",
                d3.forceManyBody().strength(repulsion).distanceMax(400),
              )
              .force(
                "center",
                d3.forceCenter(width / 2, height / 2).strength(0.05),
              )
              .force(
                "collision",
                d3.forceCollide().radius(colRadius).strength(0.8).iterations(2),
              )
              .on("tick", () => {
                this._linkSelection
                  .attr("x1", (d) => d.source.x)
                  .attr("y1", (d) => d.source.y)
                  .attr("x2", (d) => d.target.x)
                  .attr("y2", (d) => d.target.y);
                nodeEnter.attr("transform", (d) => `translate(${d.x},${d.y})`);
              });

            d3.select("#zoomInBtn").on("click", () =>
              svg.transition().duration(200).call(zoomBehavior.scaleBy, 1.3),
            );
            d3.select("#zoomOutBtn").on("click", () =>
              svg.transition().duration(200).call(zoomBehavior.scaleBy, 0.7),
            );
            d3.select("#zoomResetBtn").on("click", () =>
              svg
                .transition()
                .duration(300)
                .call(zoomBehavior.transform, d3.zoomIdentity),
            );

            this._updateVisuals();
          },

          _closeContextMenu() {
            if (this.contextMenu) {
              this.contextMenu.node.isHighlighted = false;
              this.contextMenu = null;
              this._updateVisuals();
            }
          },
          _setupContextMenu() {
            document.addEventListener("click", () => this._closeContextMenu());
            document.addEventListener("contextmenu", (e) => {
              if (!e.target.closest(".node-g")) this._closeContextMenu();
            });
          },
          /**
           * @param {*} event
           * @param {Node} node
           */
          _updateContextMenu(event, node) {
            node.isHighlighted = true;
            const menuW = 175;
            const menuH = 240;
            let x = event.clientX;
            let y = event.clientY;
            if (x + menuW > window.innerWidth) x -= menuW;
            if (y + menuH > window.innerHeight) y -= menuH;

            const speedLabel =
              SPEED_PATTERNS[node.speedIndex].arrow +
              " " +
              SPEED_PATTERNS[node.speedIndex].label;
            const nodeType = node.isInfluencer
              ? "👑 インフルエンサー"
              : "ユーザー";
            const title = `${nodeType} ID:${node.id} ${speedLabel}`;
            const sources = this.availableSources.map((info) => {
              const prop = SOURCE_PROPS[info.kind];
              const msg = node.source === info.kind ? "を解除" : "に設定";
              return {
                kind: info.kind,
                label: `${prop.icon} ${prop.name}${msg}`,
              };
            });
            this.contextMenu = {
              x, y,
              title,
              sources,
              node,
            };
          },
          changeSpeed(index) {
            this.contextMenu.node.speedIndex = index;
            this.updateSpeedLabels();
            this._closeContextMenu();
          },

          _makeDraggable(parent, el, handle = null) {
            let offsetX, offsetY;
            if (handle === null) handle = el;
            handle.addEventListener("mousedown", (e) => {
              if (e.target.tagName === "INPUT" || e.target.tagName === "BUTTON")
                return;
              e.preventDefault();
              const pr = parent.getBoundingClientRect();
              const rect = el.getBoundingClientRect();
              offsetX = e.clientX - rect.left + pr.left;
              offsetY = e.clientY - rect.top + pr.top;
              el.style.transform = "none";
              const onMove = (e) => {
                el.style.left = `${e.clientX - offsetX}px`;
                el.style.top = `${e.clientY - offsetY}px`;
              };
              const onUp = () => {
                document.removeEventListener("mousemove", onMove);
                document.removeEventListener("mouseup", onUp);
              };
              document.addEventListener("mousemove", onMove);
              document.addEventListener("mouseup", onUp);
            });
          },

          /**
           * @param {HTMLElement} mainEl
           */
          _setupDrag(mainEl) {
            this._makeDraggable(
              document.getElementById("main"),
              document.getElementById("livePanel"),
              document.getElementById("panelDragHandle"),
            );
            this._makeDraggable(
              document.getElementById("main"),
              document.getElementById("balanceFloat"),
            );
          },
          _setFloatingPanelPositions() {
            const pr = document.getElementById("main").getBoundingClientRect();
            const lp = document.getElementById("livePanel");
            const lr = lp.getBoundingClientRect();
            lp.style.left = `${pr.width - lr.width - 14}px`;
            lp.style.top = `${pr.height - lr.height - 14}px`;
            const bf = document.getElementById("balanceFloat");
            const br = bf.getBoundingClientRect();
            bf.style.left = `${(pr.width - br.width) / 2}px`;
            bf.style.top = "14px";
          },

          _setupResizeObserver() {
            let timer = null;
            new ResizeObserver(() => {
              clearTimeout(timer);
              timer = setTimeout(() => this._drawGraph(), 200);
            }).observe(document.getElementById("livePanel"));
          },

          // ===== 拡散シミュレーション =====
          async _startBasicScenario(startIds) {
            this._startTime = performance.now();
            this._graphData = [];
            this._time50 = null;
            this._time90 = null;
            this.ui = { ...this.ui, time50: "--", time90: "--", done: "--" };

            const prob = this.basicSpreadProbability;
            /**
             * @type {{
             *   id: number,
             *   from?: number,
             *   at: number,
             * }[]}
             */
            const queue = [];
            const visited = new Set();

            startIds.forEach((sid) => {
              if (visited.has(sid)) return;
              visited.add(sid);
              queue.push({ id: sid, from: undefined, at: 0 });
              const n = _nodes[sid];
              const oldStat = this._applyInfo(n, "info", true);
              this._updateStat(oldStat, n.status);
            });

            this._writeLog(
              `${startIds.length}件の発信源から情報拡散を開始（伝達確率${Math.round(prob * 100)}%）`,
            );
            this._updateVisuals();
            this._recordSnapshot(0);
            let currentTime = 0;

            try {
              while (queue.length > 0) {
                const mode = await this._interceptLifecycle();
                queue.sort((a, b) => a.at - b.at);
                const event = queue.shift();
                if (mode === "step") {
                  const stepEnd =
                    currentTime + STEP_TIME_MS / this.speedMultiplier;
                  if (event.at > stepEnd) {
                    queue.unshift(event);
                    this.runStatus = "paused";
                    continue;
                  }
                }
                if (!this.isSpreading) throw new Error("Aborted");
                const delay = Math.max(0, event.at - currentTime);
                if (!this.isPaused) await this._wait(delay);
                currentTime = event.at;
                const node = _nodes[event.id];
                if (event.from != null) {
                  const oldStat = this._applyInfo(node, "info", false);
                  this._activeLinkKeys.add(
                    this._edgeKey(event.from, event.id) + "-info",
                  );
                  this._updateStat(oldStat, node.status);
                }
                this._pulseNode(event.id);
                this._updateVisuals();
                this._checkMilestones();
                this._recordSnapshot(currentTime / BASE_SPREAD_DELAY);
                node.neighbors.forEach((nid) => {
                  if (visited.has(nid)) return;
                  if (prob < 1.0 && Math.random() > prob) return;
                  visited.add(nid);
                  const d = this._effectiveDelay(_nodes[nid].speedIndex);
                  queue.push({ id: nid, from: event.id, at: currentTime + d });
                });
              }
              this._finishSpread("拡散完了");
            } catch (e) {
              if (e.message !== "Aborted") console.error(e);
            }
          },

          async _startCorrectionScenario() {
            /** @type { number[] } */
            const falseIds =
              this.sourceIds.false.length > 0
                ? [...this.sourceIds.false]
                : [this._getDefaultStartNodeId()];
            /** @type { number[] } */
            const trueIds =
              this.sourceIds.true.length > 0
                ? [...this.sourceIds.true]
                : [this._getCorrectionSourceId(falseIds[0])];

            this._startTime = performance.now();
            this._graphData = [];
            this._time50 = null;
            this._time90 = null;
            this.ui = { ...this.ui, time50: "--", time90: "--", done: "--" };

            const correctionStartDelay =
              (this.correctionDelaySec * 2 * BASE_SPREAD_DELAY) /
              this.speedMultiplier;
            /**
             * @type { {
             *   id: number,
             *   from?: number,
             *   at: number,
             *   type: "info" | "false" | "corrected"
             * }[] }
             */
            const queue = [];
            const visitedByType = { false: new Set(), corrected: new Set() };

            falseIds.forEach((id) => {
              if (visitedByType.false.has(id)) return;
              visitedByType.false.add(id);
              queue.push({
                id,
                from: undefined,
                at: 0,
                type: "false",
                isSource: true,
              });
            });
            trueIds.forEach((id) => {
              if (visitedByType.corrected.has(id)) return;
              visitedByType.corrected.add(id);
              queue.push({
                id,
                from: undefined,
                at: correctionStartDelay,
                type: "corrected",
                isSource: true,
              });
            });

            this._writeLog(
              `${SOURCE_PROPS.false.name}${falseIds.length}件、` +
                `${SOURCE_PROPS.true.name}${trueIds.length}件（${this.correctionDelaySec.toFixed(1)}秒後）`,
            );
            let currentTime = 0;
            this._recordSnapshot(0);

            try {
              while (queue.length > 0) {
                const mode = await this._interceptLifecycle();
                queue.sort((a, b) => a.at - b.at);
                const event = queue.shift();
                if (mode === "step") {
                  const stepEnd =
                    currentTime + STEP_TIME_MS / this.speedMultiplier;
                  if (event.at > stepEnd) {
                    queue.unshift(event);
                    this.runStatus = "paused";
                    continue;
                  }
                }
                if (!this.isSpreading) throw new Error("Aborted");
                const delay = Math.max(0, event.at - currentTime);
                if (!this.isPaused) await this._wait(delay);
                currentTime = event.at;
                const node = _nodes[event.id];
                const oldStat = this._applyInfo(node, event.type, event.isSource);
                if (node.status === oldStat) continue;
                if (event.from != null)
                  this._activeLinkKeys.add(
                    this._edgeKey(event.from, event.id) + "-" + event.type,
                  );
                this._pulseNode(event.id);
                this._updateVisuals();
                this._checkMilestones();
                this._updateStat(oldStat, node.status);
                this._recordSnapshot(currentTime / BASE_SPREAD_DELAY);
                node.neighbors.forEach((nid) => {
                  const target = _nodes[nid];
                  if (visitedByType[event.type].has(nid)) return;
                  if (event.type === "false" && target.status !== "idle")
                    return;
                  if (event.type === "corrected" && target.status !== "idle" && target.status !== "false")
                    return;
                  const threshold =
                    event.type === "false"
                      ? this.misinfoProbability
                      : this.correctionSpreadProbability;
                  if (Math.random() > threshold) return;
                  visitedByType[event.type].add(nid);
                  const d = this._effectiveDelay(target.speedIndex);
                  queue.push({
                    id: nid,
                    from: event.id,
                    at: currentTime + d,
                    type: event.type,
                    isSource: false,
                  });
                });
              }
              this._finishSpread("シナリオ終了");
            } catch (e) {
              if (e.message !== "Aborted") console.error(e);
            }
          },

          /**
           * @param {Node} node
           * @param {Status} type
           */
          _applyInfo(node, type, isSource = false) {
            const cur = node.status;
            if (type === "info" && (cur === "idle" || isSource)) {
              node.status = "info";
            } else if (type === "false" && (cur === "idle" || isSource)) {
              node.status = "false";
            } else if (type === "corrected") { // souce-true & idle->true もcorrected扱いになっている
              if (cur === "false" && (isSource || Math.random() <= this.correctionChance)) {
                node.status = "corrected";
              } else if (cur === "idle") {
                node.status = "corrected";
              }
            }
            return cur;
          },

          async _interceptLifecycle() {
            if (!this.isSpreading) throw new Error("Aborted");
            while (this.isPaused) {
              if (this._stepRequested) {
                this._stepRequested = false;
                return "step";
              }
              await this._wait(80);
              if (!this.isSpreading) throw new Error("Aborted");
            }
            return "normal";
          },

          _wait(ms) {
            return new Promise((r) => setTimeout(r, ms));
          },
          /**
           * @param { number } speedIndex
           */
          _effectiveDelay(speedIndex) {
            return SPEED_PATTERNS[speedIndex].ms / this.speedMultiplier;
          },

          _checkMilestones() {
            const reached = _nodes.filter((n) => n.status !== "idle").length;
            const elapsed = (performance.now() - this._startTime) / 1000;
            if (!this._time50 && reached >= this.userCount * 0.5) {
              this._time50 = elapsed;
              this.ui = { ...this.ui, time50: elapsed.toFixed(2) + "秒" };
            }
            if (!this._time90 && reached >= this.userCount * 0.9) {
              this._time90 = elapsed;
              this.ui = { ...this.ui, time90: elapsed.toFixed(2) + "秒" };
            }
          },

          /**
           * @param {Status} oldStat
           * @param {Status} newStat
           */
          _updateStat(oldStat, newStat) {
            stat[oldStat]--;
            stat[newStat]++;
            this._updateUiMetrics();
          },

          _resetStat() {
            stat.idle = this.userCount;
            stat.false = 0;
            stat.corrected = 0;
            stat.info = 0;
            this._resetUiMetrics();
          },

          _updateUiMetrics() {
            const total = this.userCount;
            const fp = Math.round((stat.false / total) * 100);
            const tp = Math.round((stat.corrected / total) * 100);
            this.ui = {
              ...this.ui,
              reached: Math.round((1.0 - stat.idle / total) * 100) + "%",
              falseCount: stat.false + "人",
              trueCount: stat.corrected + "人",
              barFalsePct: fp,
              barTruePct: tp,
              barIdlePct: Math.max(0, 100 - fp - tp),
            };
          },

          _resetUiMetrics() {
            this._time50 = null;
            this._time90 = null;
            this.ui = {
              reached: "0%",
              falseCount: "0人",
              trueCount: "0人",
              time50: "--",
              time90: "--",
              done: "--",
              barFalsePct: 0,
              barIdlePct: 100,
              barTruePct: 0,
            };
          },

          _finishSpread(label) {
            const dur = (performance.now() - this._startTime) / 1000;
            this.ui = {
              ...this.ui,
              time50: this._time50 ? this.ui.time50 : "未到達",
              time90: this._time90 ? this.ui.time90 : "未到達",
              done: dur.toFixed(2) + "秒",
            };
            this._writeLog(`🏁 ${label}：計${dur.toFixed(2)}秒`);
            this.runStatus = "finished";
            this._updateVisuals();
          },

          _softResetStatuses() {
            this.runStatus = "none";
            this._stepRequested = false;
            this._activeLinkKeys.clear();
            this._graphData = [];
            _nodes.forEach((n) => n.status = "idle");
            this._resetStat();
            this._updateVisuals();
            this._drawGraph();
          },

          _prevData: null,
          /**
           * @param {number} step
           */
          _recordSnapshot(step) {
            this._graphData.push({
              step,
              ...stat
            });
            this._drawGraph();
          },
          _drawGraph() {
            const gSvg = d3.select("#graphSvg");
            const container = document.getElementById("graphSvg");
            const W = container.clientWidth || 420;
            const H = container.clientHeight || 120;
            gSvg.selectAll("*").remove();
            if (this._graphData.length < 2) return;
            const m = { top: 8, right: 8, bottom: 20, left: 30 };
            const cw = W - m.left - m.right,
              ch = H - m.top - m.bottom;
            const g = gSvg
              .append("g")
              .attr("transform", `translate(${m.left},${m.top})`);
            const maxStep = this._graphData.at(-1).step || 1;
            const xS = d3
              .scaleLinear()
              .domain([0, maxStep])
              .range([0, cw]);
            const yS = d3
              .scaleLinear()
              .domain([0, this.userCount])
              .range([ch, 0]);
            g.append("g")
              .attr("transform", `translate(0,${ch})`)
              .attr("class", "axis")
              .call(d3.axisBottom(xS).ticks(5))
              .style("font-size", "9px")
              .style("color", "var(--subtle)");
            g.append("g")
              .attr("class", "axis")
              .call(d3.axisLeft(yS).ticks(4))
              .style("font-size", "9px")
              .style("color", "var(--subtle)");
            if (this.scenario === "basic") {
              g.append("path")
                .datum(this._graphData)
                .attr("fill", "none")
                .attr("stroke", "var(--info)")
                .attr("stroke-width", 2)
                .attr(
                  "d",
                  d3
                    .line()
                    .x((d) => xS(d.step))
                    .y((d) => yS(d.info)),
                );
            } else {
              g.append("path")
                .datum(this._graphData)
                .attr("fill", "none")
                .attr("stroke", "var(--false)")
                .attr("stroke-width", 2.5)
                .attr(
                  "d",
                  d3
                    .line()
                    .x((d) => xS(d.step))
                    .y((d) => yS(d.false)),
                );
              g.append("path")
                .datum(this._graphData)
                .attr("fill", "none")
                .attr("stroke", "var(--corrected)")
                .attr("stroke-width", 2.5)
                .attr(
                  "d",
                  d3
                    .line()
                    .x((d) => xS(d.step))
                    .y((d) => yS(d.corrected)),
                );
            }
          },

          // ===== ビジュアル =====
          _nodeRadius(d) {
            // const base = this.userCount > 200 ? 4.5 : 8;
            const base = 8;
            return d.isInfluencer ? base * 1.8 : base;
          },

          /**
           * @param {int} id
           */
          _nodeClass(id) {
            const node = _nodes[id];
            const classes = ["node", node.status];
            if (node.isInfluencer) classes.push("influencer");
            if (node.source != null) classes.push(`source-${node.source}`);
            if (node.isHighlighted) classes.push("highlighted");
            return classes.join(" ");
          },

          updateSpeedLabels() {
            if (!this._labelSelection) return;
            this._labelSelection
              .text((d) =>
                this.showSpeedIcons ? SPEED_PATTERNS[d.speedIndex].arrow : "",
              )
              .style("fill", (d) => SPEED_PATTERNS[d.speedIndex].color)
              .attr("dy", (d) => -(this._nodeRadius(d) + 3));
          },

          _updateVisuals() {
            if (!this._nodeSelection || !this._linkSelection) return;
            this._nodeSelection
              .attr("class", (d) => this._nodeClass(d.id))
              .attr("r", (d) => this._nodeRadius(d));
            this._linkSelection.attr("class", (d) => {
              const s = typeof d.source === "object" ? d.source.id : d.source;
              const t = typeof d.target === "object" ? d.target.id : d.target;
              const key = this._edgeKey(s, t);
              const classes = ["link"];
              // if (this._isInfluencerLink(d)) classes.push("influencer");
              if (this._activeLinkKeys.has(key + "-info")) classes.push("info");
              if (this._activeLinkKeys.has(key + "-false")) classes.push("false");
              if (this._activeLinkKeys.has(key + "-corrected"))
                classes.push("corrected");
              return classes.join(" ");
            });
            this.updateSpeedLabels();
          },

          _pulseNode(id) {
            if (!this._nodeSelection) return;
            const node = _nodes.find((n) => n.id === id);
            const r = node ? this._nodeRadius(node) : 6;
            this._nodeSelection
              .filter((d) => d.id === id)
              .transition()
              .duration(80)
              .attr("r", r * 1.9)
              .transition()
              .duration(100)
              .attr("r", r);
          },

          // _isInfluencerLink(d) {
          //   const s = typeof d.source === "object" ? d.source.id : d.source;
          //   const t = typeof d.target === "object" ? d.target.id : d.target;
          //   const sN = _nodes[s];
          //   const tN = _nodes[t];
          //   return sN.isInfluencer || tN.isInfluencer;
          // },

          _edgeKey(a, b) {
            return a < b ? `${a}-${b}` : `${b}-${a}`;
          },

          legends() {
            if (this.scenario === "basic") {
              return [
                ALL_LEGENDS.idle,
                ALL_LEGENDS.influencer,
                ALL_LEGENDS.source,
                ALL_LEGENDS.info
              ];
            } else {
              return [
                ALL_LEGENDS.idle,
                ALL_LEGENDS.influencer,
                ALL_LEGENDS.sourceFalse,
                ALL_LEGENDS.sourceTrue,
                ALL_LEGENDS.false,
                ALL_LEGENDS.corrected,
              ];
            }
          },

          // ===== ユーティリティ =====
          /**
           * @param {int[]} excludeIds
           */
          _newSource(excludeIds) {
            const l = _nodes.length - excludeIds.length;
            let i = Math.floor(Math.random() * l);
            for (const id of excludeIds) {
              if (i >= id) {
                i++;
              } else {
                break;
              }
            }
            return i;
          },

          _getDefaultStartNodeId() {
            const n = _nodes.find((n) => !n.isInfluencer);
            return n?.id ?? 0;
          },

          /**
           * @param { number } falseId
           */
          _getCorrectionSourceId(falseId) {
            const infs = _nodes.filter(
              (n) => n.isInfluencer && n.id !== falseId,
            );
            if (infs.length > 0) return infs[0].id;
            const n = _nodes.reduce((best, n) => {
              if (n.id === falseId) return best;
              const d = n.degree || 0;
              const bd = best?.degree || -1;
              return d > bd ? n : best;
            }, null);
            return n?.id ?? 0;
          },

          _writeLog(text) {
            const logEl = document.getElementById("log");
            const d = document.createElement("div");
            d.textContent = "> " + text;
            logEl.prepend(d);
            while (logEl.children.length > 30)
              logEl.removeChild(logEl.lastElementChild);
          },
        };
      }
    </script>
  </body>
