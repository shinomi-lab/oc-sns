<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SNS情報拡散シミュレーター</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <style>
      :root {
        --bg: #0f172a;
        --surface: #1e293b;
        --panel: #334155;
        --line: #475569;
        --line-soft: #64748b;
        --text: #f8fafc;
        --muted: #cbd5e1;
        --subtle: #94a3b8;
        --accent: #22d3ee;
        --accent-dark: #0891b2;
        --abort: #ef4444;
        --influencer: #facc15;
        --shadow:
          0 20px 25px -5px rgb(0 0 0 / 0.5), 0 8px 10px -6px rgb(0 0 0 / 0.5);
        /* base colors */
        --vacuous-base: hsl(215, 19%, 35%);
        --plain-base: hsl(128, 100%, 50%);
        --false-base: hsl(0, 70%, 65%);
        --true-base: hsl(240, 70%, 65%);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          "Hiragino Sans", "iragino Kaku Gothic ProN", "Noto Sans JP",
          sans-serif;
        overflow: hidden;
      }
      .app {
        display: grid;
        grid-template-columns: 360px 1fr;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }
      .sidebar {
        background: var(--surface);
        border-right: 1px solid var(--line);
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        overflow-y: auto;
        box-shadow: 4px 0 24px rgba(0, 0, 0, 0.3);
        z-index: 10;
      }
      header h1 {
        margin: 0;
        color: var(--accent);
        font-size: 17px;
        font-weight: 800;
        letter-spacing: -0.3px;
      }
      header .subtitle {
        margin: 3px 0 0;
        color: var(--subtle);
        font-size: 12px;
      }
      .section-title {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: var(--subtle);
        margin: 4px 0 2px;
        font-weight: 700;
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        /*padding-bottom: 4px;*/
      }
      .config-panel {
        background: rgba(15, 23, 42, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 12px;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 9px;
      }
      .item-field {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .item-label-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .item-label-row span {
        font-size: 14px;
        font-weight: 600;
      }
      .item-label-left {
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .item-value {
        color: var(--accent);
        font-weight: 700;
      }
      .warn-icon {
        display: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #f59e0b;
        color: #000;
        font-size: 9px;
        font-weight: 900;
        align-items: center;
        justify-content: center;
        cursor: default;
        position: relative;
      }
      .warn-icon.visible {
        display: flex;
      }
      .warn-icon .tooltip {
        display: none;
        position: absolute;
        bottom: 18px;
        right: 0;
        background: #1e293b;
        border: 1px solid #f59e0b;
        border-radius: 5px;
        padding: 4px 7px;
        font-size: 10px;
        color: var(--text);
        white-space: nowrap;
        z-index: 100;
        font-weight: 600;
      }
      .warn-icon:hover .tooltip {
        display: block;
      }
      .slider {
        width: 100%;
        height: 5px;
        background: #0f172a;
        border-radius: 3px;
        outline: none;
        -webkit-appearance: none;
        cursor: pointer;
        margin: 4px 0;
      }
      .slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 13px;
        height: 13px;
        border-radius: 50%;
        background: var(--accent);
      }
      .slider:disabled {
        opacity: 0.2;
        cursor: not-allowed;
      }
      /* タブ */
      .tab-content {
        border-radius: 0 0 4px 4px;
        border: 1px solid var(--line-soft);
        display: flex;
        flex-direction: column;
        gap: 9px;
        padding: 10px;
      }
      .segmented {
        display: flex;
        flex-direction: row;
      }
      .segmented button {
        flex: 1;
        border: 1px solid var(--line-soft);
        border-bottom: 0;
        border-radius: 4px 4px 0 0;
        background: #0f172a;
        color: var(--muted);
        padding: 7px 10px;
        text-align: center;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        position: relative;
      }
      .segmented button[aria-pressed="true"] {
        background: var(--accent-dark);
        color: #fff;
        border-color: var(--accent);
        cursor: initial;
      }
      .actions-row {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 5px;
        margin-top: 2px;
      }
      .btn {
        min-height: 32px;
        border: 1px solid transparent;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 150ms ease;
        font-family: inherit;
      }
      .btn-primary {
        background: var(--accent-dark);
        color: #fff;
      }
      .btn-primary:hover:not(:disabled) {
        background: #06738d;
      }
      .btn-abort {
        background: rgba(239, 68, 68, 0.2);
        border-color: var(--abort);
        color: #fca5a5;
      }
      .btn-abort:hover:not(:disabled) {
        background: rgba(239, 68, 68, 0.35);
      }
      .btn-secondary {
        background: #0f172a;
        border-color: var(--line);
        color: var(--muted);
      }
      .btn-secondary:hover:not(:disabled) {
        background: rgba(255, 255, 255, 0.05);
      }
      .btn-step {
        background: rgba(34, 211, 238, 0.1);
        border-color: var(--accent);
        color: var(--accent);
      }
      .btn-step:hover:not(:disabled) {
        background: rgba(34, 211, 238, 0.2);
      }
      .btn:disabled {
        opacity: 0.2;
        cursor: not-allowed;
      }
      /* 発信源コントロール */
      .source-control-row {
        display: flex;
        align-items: center;
        gap: 4px;
        flex-wrap: wrap;
      }
      .source-label {
        font-size: 12px;
        font-weight: 600;
      }
      .item-label-left > .basic {
        color: var(--plain-base);
      }
      .item-label-left > .false {
        color: var(--false-base);
      }
      .item-label-left > .true {
        color: var(--true-base);
      }
      .item-value.plain {
        color: var(--plain-base);
      }
      .item-value.false {
        color: var(--false-base);
      }
      .item-value.true {
        color: var(--true-base);
      }
      .source-btn {
        flex-grow: 1;
        justify-content: center;
        min-height: 22px;
        padding: 4px 7px;
        border-radius: 5px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        border: 1px solid var(--line);
        background: #0f172a;
        color: var(--muted);
        font-family: inherit;
        display: flex;
        align-items: center;
        transition: all 150ms;
      }
      .source-btn:hover:not(:disabled) {
        background: rgba(255, 255, 255, 0.07);
        color: #fff;
      }
      .source-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      .warn-text {
        font-size: 10px;
        color: #f59e0b;
        margin-top: 2px;
        display: none;
      }
      .warn-text.visible {
        display: block;
      }
      /* 統計 */
      .metrics-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 5px;
      }
      .metric-card {
        background: rgba(15, 23, 42, 0.4);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 5px 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .metric-card strong {
        display: block;
        font-size: 16px;
        color: #fff;
      }
      .metric-card span {
        display: block;
        font-size: 12px;
        color: var(--subtle);
        margin-top: 1px;
        flex-grow: 2;
      }
      /* ログ */
      .log-panel {
        flex: 1;
        min-height: 60px;
        min-height: 120px;
        height: 480px;
        background: #0f172a;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 5px 7px;
        font-size: 10px;
        color: var(--muted);
        overflow-y: auto;
        line-height: 1.5;
      }
      .log-panel div + div {
        margin-top: 2px;
      }
      /* メインエリア */
      .main-area {
        position: relative;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle at 50% 50%,
          #1a2744 0%,
          #0f172a 100%
        );
      }
      svg#network {
        width: 100%;
        height: 100%;
        display: block;
        cursor: grab;
      }
      svg#network:active {
        cursor: grabbing;
      }
      /* D3要素 */
      .node {
        stroke: #0f172a;
        stroke-width: 1.5;
        cursor: pointer;
      }
      /*.node.idle {
        fill: var(--idle);
      }
      .node.plain {
        fill: var(--info);
      }
      .node.false {
        fill: var(--false);
      }
      .node.true {
        fill: var(--corrected);
      }*/
      .node.influencer {
        stroke: var(--influencer);
        stroke-width: 2.5;
      }
      .node.source-plain {
        stroke: var(--plain-base);
        stroke-width: 3;
      }
      .node.source-false {
        stroke: var(--false-base);
        stroke-width: 3;
      }
      .node.source-true {
        stroke: var(--true-base);
        stroke-width: 3;
      }
      .node.highlighted {
        stroke: #fff !important;
        stroke-width: 3 !important;
      }
      .speed-label {
        font-size: 12px;
        fill: rgba(255, 255, 255, 0.7);
        pointer-events: none;
        font-family: monospace;
        font-weight: 700;
        user-select: none;
      }
      /* ズームUI */
      .zoom-controls {
        position: absolute;
        top: 14px;
        right: 14px;
        display: flex;
        flex-direction: column;
        gap: 3px;
        background: rgba(15, 23, 42, 0.75);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 3px;
        backdrop-filter: blur(4px);
      }
      .zoom-btn {
        width: 26px;
        height: 26px;
        background: transparent;
        border: 0;
        color: #fff;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .zoom-btn:hover {
        background: rgba(255, 255, 255, 0.1);
      }
      /* 凡例 */
      .legend-overlay {
        position: absolute;
        left: 14px;
        bottom: 14px;
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid var(--line);
        border-radius: 7px;
        padding: 8px 10px;
        backdrop-filter: blur(4px);
        pointer-events: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .legend-items {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .legend-item {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
      }
      .swatch {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .swatch.vacuous {
        background: var(--vacuous-base);
      }
      .swatch.influencer {
        background: var(--influencer);
        border: 1.5px solid #fff;
      }
      .swatch.false {
        background: var(--false-base);
      }
      .swatch.true {
        background: var(--true-base);
      }
      .swatch.plain {
        background: var(--plain-base);
      }
      .swatch.source-plain {
        background: var(--plain-base);
        border: 1.5px solid #fff;
      }
      .swatch.source-false {
        background: var(--false-base);
        border: 2px solid #fff;
        border-radius: 2px;
      }
      .swatch.source-true {
        background: var(--true-base);
        border: 2px solid #fff;
        border-radius: 2px;
      }
      .legend-divider {
        border: none;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        margin: 0;
      }
      .legend-speed-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .legend-speed-label {
        font-size: 12px;
        color: var(--subtle);
        font-weight: 700;
      }
      .speed-items {
        display: flex;
        gap: 8px;
      }
      .speed-item {
        font-size: 12px;
        color: var(--muted);
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 3px;
      }
      .speed-arrow {
        font-family: monospace;
        font-size: 14px;
        font-weight: 700;
      }
      .legend-toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        user-select: none;
      }
      .toggle-checkbox {
        width: 12px;
        height: 12px;
        accent-color: var(--accent);
        cursor: pointer;
      }
      .legend-toggle-label {
        font-size: 12px;
        color: var(--subtle);
        font-weight: 600;
      }
      /* バランスメータ */
      .balance-float {
        position: absolute;
        background: rgba(15, 23, 42, 0.82);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 14px;
        backdrop-filter: blur(6px);
        visibility: hidden;
        cursor: grab;
        z-index: 5;
        width: 300px;
      }
      .balance-float.active {
        visibility: visible;
      }
      .balance-float:active {
        cursor: grabbing;
      }
      .balance-bar {
        display: flex;
        height: 10px;
        border-radius: 5px;
        overflow: hidden;
        background: rgba(71, 85, 105, 0.3);
      }
      .bar-false {
        background: var(--false-base);
        transition: width 200ms ease;
      }
      .bar-plain {
        background: var(--false-plain);
        transition: width 200ms ease;
      }
      .bar-true {
        background: var(--true-base);
        transition: width 200ms ease;
      }
      .balance-nums {
        display: flex;
        justify-content: space-between;
        margin-top: 5px;
        font-size: 12px;
        font-weight: 700;
      }
      /* ライブインフォパネル */
      .live-panel {
        position: absolute;
        width: 460px;
        min-width: 280px;
        background: rgba(23, 33, 50, 0.88);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(8px);
        display: flex;
        flex-direction: column;
        z-index: 5;
        overflow: auto;
      }
      .live-panel.minimized {
        overflow: hidden;
      }
      .panel-header {
        background: rgba(15, 23, 42, 0.6);
        padding: 7px 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        font-size: 12px;
        font-weight: 700;
        cursor: grab;
        flex-shrink: 0;
        border-radius: 8px 8px 0 0;
      }
      .panel-header:active {
        cursor: grabbing;
      }
      .panel-controls {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .opacity-label {
        font-size: 9px;
        color: var(--subtle);
      }
      .opacity-slider {
        width: 50px;
        height: 4px;
        accent-color: var(--accent);
        cursor: pointer;
      }
      .panel-toggle-btn {
        background: transparent;
        border: 0;
        color: var(--subtle);
        cursor: pointer;
        font-size: 13px;
        font-weight: 800;
        line-height: 1;
      }
      .panel-toggle-btn:hover {
        color: #fff;
      }
      .panel-body {
        padding: 4px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex: 1;
        min-height: 120px;
      }
      .panel-body svg {
        flex: 1;
        min-height: 80px;
      }
      .minimized .panel-body {
        display: none;
      }
      /* コンテキストメニュー */
      .node-context-menu {
        position: fixed;
        background: #1e293b;
        border: 1px solid var(--line-soft);
        border-radius: 8px;
        box-shadow: var(--shadow);
        padding: 5px;
        z-index: 200;
        flex-direction: column;
        gap: 2px;
        min-width: 170px;
      }
      .menu-header {
        font-size: 12px;
        color: var(--subtle);
        font-weight: 800;
        padding: 3px 7px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        margin-bottom: 3px;
      }
      .menu-section-label {
        font-size: 10px;
        color: var(--subtle);
        padding: 3px 7px 1px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .menu-item {
        background: transparent;
        border: 0;
        color: var(--muted);
        text-align: left;
        padding: 5px 7px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        border-radius: 4px;
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: inherit;
        width: 100%;
      }
      .menu-item:hover {
        background: var(--accent-dark);
        color: #fff;
      }
      .menu-separator {
        border: none;
        border-top: 1px solid rgba(255, 255, 255, 0.07);
        margin: 3px 0;
      }
      .axis line,
      .axis path {
        stroke: rgba(255, 255, 255, 0.08);
      }
      /* Alpine cloak */
      [x-cloak] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <!--
      Alpine.jsのx-dataルートは<body>に置く。
      D3が管理するSVG領域（#network, #graphSvg）はAlpineのテンプレート外として扱い、
      Alpine側からは触らない。凡例(#legendItems)のみJS側でinnerHTMLを更新する（D3と同じ理由）。
    -->
    <div x-data="App.simulator()" x-init="init()">
      <div class="app">
        <aside class="sidebar">
          <header>
            <h1>SNS情報拡散シミュレーション</h1>
            <!--<p class="subtitle">ネットワーク上での情報の広がりを見てみよう</p>-->
          </header>

          <div class="section-title">ネットワーク</div>
          <div class="config-panel">
            <div class="item-field">
              <div class="item-label-row">
                <span>ユーザー数</span>
                <span class="item-value" x-text="userCount + '人'"></span>
              </div>
              <input
                type="range"
                id="userCountInput"
                min="20"
                max="600"
                value="250"
                class="slider"
                :disabled="!isNone"
                x-model.number="userCount"
                @change="regenerateNetwork()"
              />
            </div>
            <!--<div class="item-field">
              <div class="item-label-row">
                <span>繋がりのレベル</span>
                <span class="item-value" x-text="mParam"></span>
              </div>
              <input
                type="range"
                id="mInput"
                min="1"
                max="10"
                value="2"
                class="slider"
                :disabled="isSpreading"
                x-model.number="mParam"
              />
            </div>-->
            <button
              type="button"
              class="btn btn-secondary"
              id="regenerateButton"
              style="width: 100%; font-weight: 800; font-size: 11px"
              :disabled="!isNone"
              @click="regenerateNetwork()"
            >
              ネットワークを再生成
            </button>
          </div>

          <div class="section-title">シナリオ</div>
          <div class="config-panel">
            <div class="item-field">
              <div class="item-label-row">
                <span>インフルエンサー人数</span>
                <span class="item-value" x-text="influencerCount + '人'"></span>
              </div>
              <input
                type="range"
                id="influencerCountInput"
                min="1"
                :max="Math.min(20, userCount)"
                value="2"
                class="slider"
                :disabled="!isNone"
                x-model.number="influencerCount"
                @change="onInfluencerCountChange()"
              />
            </div>
            <div>
              <div class="segmented" role="group">
                <template x-for="(tab, index) in scenarioTabs" :key="index">
                  <button
                    type="button"
                    :aria-pressed="String(scenario === tab.kind)"
                    :disabled="(scenario === tab.kind) || isSpreading"
                    @click="setScenario(tab.kind)"
                    x-text="tab.label"
                  ></button>
                </template>
              </div>

              <!-- シナリオオプション -->
              <div class="tab-content">
                <template x-for="(param, index) in sliders()" :key="index">
                  <div class="item-field">
                    <div class="item-label-row">
                      <div class="item-label-left">
                        <span x-text="param.label"></span>
                      </div>
                      <span class="item-value" x-text="param.valueLabel"></span>
                    </div>
                    <input
                      type="range"
                      :min="param.min"
                      :max="param.max"
                      :step="param.step"
                      :value="param.value"
                      x-model.number="param.value"
                      class="slider"
                      :disabled="!isNone"
                    />
                  </div>
                </template>
                <!-- 発信源 -->
                <template

    <script>
      const App = (() => {
        /**
        * @typedef {"basic" | "correction"} Scenario
        * @typedef {"plain"} BasicInfo
        [todo] negative, positive
        * @typedef {"false" | "true"} CorrectionInfo
        * @typedef {BasicInfo | CorrectionInfo} Info
        */

        const SPEED_DIST_WEIGHTS = [0.35, 0.28, 0.2, 0.11, 0.06];
        const BASE_SPREAD_DELAY = 500;
        const STEP_TIME_MS = 1000;

        const SPEED_PATTERNS = Object.freeze([
          { label: "最速", arrow: "↑", ms: 160, color: "#f472b6" },
          { label: "早い", arrow: "↗", ms: 240, color: "#fb923c" },
          { label: "普通", arrow: "→", ms: 320, color: "#facc15" },
          { label: "遅い", arrow: "↘", ms: 400, color: "#60a5fa" },
          { label: "最遅", arrow: "↓", ms: 500, color: "#818cf8" },
        ]);

        const SPEED_LABELS = SPEED_PATTERNS.map((p) => `${p.arrow} ${p.label}`);

        /**
         * @type{Record<Info, {name: string, longName?: string}>}
         */
        const INFO_PROPS = {
          plain: {
            name: "",
          },
          false: {
            name: "デマ",
          },
          true: {
            name: "訂正",
            longName: "訂正情報",
          },
        };

        /**
         * @type{Record<Info, {icon: string, name: string}>}
         */
        const SOURCE_PROPS = {
          plain: {
            icon: "🏁",
            name: `${INFO_PROPS.plain.name}発信源`,
          },
          false: {
            icon: "🔴",
            name: `${INFO_PROPS.false.name}発信源`,
          },
          true: {
            icon: "🟢",
            name: `${INFO_PROPS.true.longName}発信源`,
          },
        };

        const INFOS_BY_SOURCE = {
          /** @type {readonly ["plain"]} */
          basic: ["plain"],
          /** @type {readonly ["false", "true"]} */
          correction: ["false", "true"],
        };

        const SCENARIO_TAB = {
          basic: "単純な情報拡散",
          correction: `${INFO_PROPS.false.name} vs ${INFO_PROPS.true.name}`,
        };

        const ALL_LEGENDS = {
          vacuous: { kind: "vacuous", label: "未到達" },
          plain: { kind: "plain", label: "情報を受け取った" },
          false: { kind: "false", label: `${INFO_PROPS.false.name}を信じた` },
          true: { kind: "true", label: `${INFO_PROPS.true.longName}を信じた` },
          influencer: { kind: "influencer", label: "インフルエンサー" },
          sourcePlain: { kind: "source-plain", label: SOURCE_PROPS.plain.name },
          sourceFalse: { kind: "source-false", label: SOURCE_PROPS.false.name },
          sourceTrue: { kind: "source-true", label: SOURCE_PROPS.true.name },
        };

        function writeLog(text) {
          const logEl = document.getElementById("log");
          const d = document.createElement("div");
          d.textContent = "> " + text;
          logEl.prepend(d);
          while (logEl.children.length > 30)
            logEl.removeChild(logEl.lastElementChild);
        }

        /**
         * @param {number} seed
         */
        function _seededRandom(seed) {
          let v = seed % 2147483647;
          if (v <= 0) v += 2147483646;
          return () => {
            v = (v * 16807) % 2147483647;
            return (v - 1) / 2147483646;
          };
        }

        /**
         * @typedef {"idle" | "info" | "false" | "corrected"} Status
         */

        /**
       *
       * @typedef {Vacuous | Adopted} Adoption
       *
       * @typedef {Object} Vacuous
       * @property {"vacuous"} kind
       *
       * @typedef {Object} Adopted
       * @property {"adopted"} kind
       * @property {Info} info
       * @property {number} sourceId
       *
       * @callback  ApplyInfo
       * @param {Info} info
       * @param {number} sourceId
       * @param {(cur: Adoption) => boolean} [overwrite]
       * @returns {Adoption | null}

       * @typedef {Object} Node
       * @property {number} id
       * @property {Set<number>} outNeighbors
       * @property {Set<number>} inNeighbors
       * @property {readonly number} degree
       * @property {readonly number[]} neighbors
       * @property {number} [x]
       * @property {number} y
       * @property {number} vx
       * @property {number} vy
       * @property {number} speedIndex
       * @property {boolean} isInfluencer
       * @property {boolean} isHighlighted
       * @property {Info} [source]
       * @property {Adoption} adoption
       * @property {ApplyInfo} apply
       */

        /**
         * @param { number } id
         * @returns { Node }
         */
        function newNode(id) {
          return {
            id,
            outNeighbors: new Set(),
            inNeighbors: new Set(),
            get degree() {
              return this.inNeighbors.size + this.outNeighbors.size;
            },
            get neighbors() {
              return [...this.inNeighbors, ...this.outNeighbors];
            },
            speedIndex: 0,
            isInfluencer: false,
            isHighlighted: false,
            adoption: { kind: "vacuous" },
            source: undefined,
            apply(info, sourceId, overwrite) {
              const cur = { ...this.adoption };
              if (cur.kind === "vacuous") {
                this.adoption = {
                  kind: "adopted",
                  info,
                  sourceId,
                };
                return cur;
              }
              if (overwrite && overwrite(cur)) {
                this.adoption = {
                  kind: "adopted",
                  info,
                  sourceId,
                };
                return cur;
              }
              return null;
            },
          };
        }

        /**
         * @template T
         * @typedef {Object} Link<T>
         * @property {T} source
         * @property {T} target
         */

        /**
         * @typedef {Object} SliderParams
         * @property {string} label
         * @property {readonly string} valueLabel
         * @property {number} min
         * @property {number} max
         * @property {number} step
         * @property {number} value
         * @property {readonly number} into
         */

        /** @type {SliderParams} */
        const basicInfoSlider = {
          min: 0,
          max: 100,
          step: 5,
          value: 50,
          get valueLabel() {
            return this.value + "%";
          },
          get into() {
            return this.value / 100;
          },
          label: "情報の伝わりやすさ",
        };
        /** @type {SliderParams} */
        const misInfoSlider = {
          min: 0,
          max: 100,
          step: 5,
          value: 80,
          get valueLabel() {
            return this.value + "%";
          },
          get into() {
            return this.value / 100;
          },
          label: `${INFO_PROPS.false.name}の伝わりやすさ`,
        };
        /** @type {SliderParams} */
        const trueInfoSlider = {
          min: 0,
          max: 100,
          step: 5,
          value: 60,
          get valueLabel() {
            return this.value + "%";
          },
          get into() {
            return this.value / 100;
          },
          label: `${INFO_PROPS.true.longName}の伝わりやすさ`,
        };
        /** @type {SliderParams} */
        const correctChanceSlider = {
          min: 0,
          max: 100,
          step: 5,
          value: 40,
          get valueLabel() {
            return this.value + "%";
          },
          get into() {
            return this.value / 100;
          },
          label: `${INFO_PROPS.true.longName}を受け入れる確率`,
        };
        /** @type {SliderParams} */
        const trueInfoDelaySlider = {
          min: 0,
          max: 12,
          step: 1,
          value: 4,
          get into() {
            return this.value / 4;
          },
          get valueLabel() {
            return this.into.toFixed(2) + "秒後";
          },
          label: `${INFO_PROPS.true.longName}の発信タイミング`,
        };

        /**
         * @type { Node[] }
         */
        let _nodes = [];
        /**
         * @type { Link<Node>[] }
         */
        let _links = [];
        /**
         * @type { Node[] }
         */
        let _sortedNodes = [];

        function _randomSpeed() {
          const r = Math.random();
          let cumul = 0;
          for (let i = 0; i < SPEED_DIST_WEIGHTS.length; i++) {
            cumul += SPEED_DIST_WEIGHTS[i];
            if (r <= cumul) {
              return i;
            }
          }
          return SPEED_DIST_WEIGHTS.length - 1;
        }

        function _shuffleSpeeds() {
          _nodes.forEach((node) => {
            node.speedIndex = _randomSpeed();
          });
        }

        let oldCount = 0;
        function _updateInfluencers(newCount) {
          for (const [index, node] of _sortedNodes.entries()) {
            if (index < newCount) {
              node.isInfluencer = true;
              node.speedIndex = 0;
            } else if (index < oldCount) {
              node.isInfluencer = false;
              node.speedIndex = _randomSpeed();
            } else {
              break;
            }
          }
          oldCount = newCount;
        }

        const activeLinkMap = {
          /**
           * @typedef {Object} ActiveLink
           * @property {Info} info
           * @property {number} sourceId
           */

          /** @type {Map<string, ActiveLink>} */
          inner: new Map(),
          /**
           * @param {number} id1
           * @param {number} id2
           */
          _key(id1, id2) {
            return id1 < id2 ? `${id1}-${id2}` : `${id2}-${id1}`;
          },
          clear() {
            this.inner.clear();
          },
          /**
           * @param {number} id1
           * @param {number} id2
           * @param {Info} info
           * @param {number} sourceId
           */
          set(id1, id2, info, sourceId) {
            this.inner.set(this._key(id1, id2), { info, sourceId });
          },
          /**
           * @param {number} id1
           * @param {number} id2
           * @returns {ActiveLink | undefined}
           */
          get(id1, id2, value) {
            return this.inner.get(this._key(id1, id2));
          },
        };

        /**
         * @typedef {Object} HSL
         * @property {number} h
         * @property {number} s
         * @property {number} l
         */

        const getCssHsl = (() => {
          /**
           * @type {Map<string, {raw: string; hsl: HSL}>}
           */
          const cache = new Map();
          /**
           * @param {string} varName
           */
          function f(varName) {
            if (!cache.has(varName)) {
              const raw = getComputedStyle(document.documentElement)
                .getPropertyValue(varName)
                .trim();
              const { h, s, l } = d3.hsl(raw);
              cache.set(varName, { raw, hsl: { h, s, l } });
            }
            return cache.get(varName);
          }
          return f;
        })();

        /**
         * @typedef {"vacuous" | Info} StatKey
         */

        /**
         */
        const COLORS = {
          get vacuous() {
            return getCssHsl("--vacuous-base");
          },
          get plain() {
            return getCssHsl("--plain-base");
          },
          get false() {
            return getCssHsl("--false-base");
          },
          get true() {
            return getCssHsl("--true-base");
          },
        };

        /**
         * @param {HSL} hsl
         * @param {number} count
         */
        function newColorMap(hsl, count) {
          let { h, s, l } = hsl;
          return Array.from({ length: count }, (_, i) => {
            const t = count === 1 ? 0.5 : i / (count - 1);
            /** @type {string} */
            const color = d3
              .hsl((h + (t - 0.5) * 40) % 360, s, l * (0.4 + t * 0.6))
              .toString();
            return color;
          });
        }

        /**
         * @typedef {Record<StatKey, number>} Stat
         * @type {Stat}
         */
        const stat = {
          vacuous: 0,
          plain: 0,
          false: 0,
          true: 0,
        };

        /**
         * @param {Adoption} adoption
         * @returns {StatKey}
         */
        function adoptionToStatKey(adoption) {
          if (adoption.kind === "vacuous") {
            return "vacuous";
          } else {
            return adoption.info;
          }
        }

        /**
         * @param {Adoption} oldAdoption
         * @param {Adoption} newAdoption
         */
        function updateStat(oldAdoption, newAdoption) {
          stat[adoptionToStatKey(oldAdoption)]--;
          stat[adoptionToStatKey(newAdoption)]++;
        }

        function _resetStat() {
          stat.vacuous = _nodes.length;
          stat.plain = 0;
          stat.false = 0;
          stat.true = 0;
        }

        function resetAdoption() {
          _nodes.forEach((n) => (n.adoption = { kind: "vacuous" }));
          _resetStat();
          activeLinkMap.clear();
        }

        /**
         * @type {({step: number} & Stat)[]}
         */
        let _graphData = [];

        /**
         * @param {number} userCount
         * @param {Scenario} scenario
         */
        function _drawGraph(userCount, scenario) {
          const gSvg = d3.select("#graphSvg");
          const container = document.getElementById("graphSvg");
          const W = container.clientWidth || 420;
          const H = container.clientHeight || 120;
          gSvg.selectAll("*").remove();
          if (_graphData.length < 2) return;
          const m = { top: 8, right: 8, bottom: 20, left: 30 };
          const cw = W - m.left - m.right,
            ch = H - m.top - m.bottom;
          const g = gSvg
            .append("g")
            .attr("transform", `translate(${m.left},${m.top})`);
          const maxStep = _graphData.at(-1).step || 1;
          const xS = d3.scaleLinear().domain([0, maxStep]).range([0, cw]);
          const yS = d3.scaleLinear().domain([0, userCount]).range([ch, 0]);
          g.append("g")
            .attr("transform", `translate(0,${ch})`)
            .attr("class", "axis")
            .call(d3.axisBottom(xS).ticks(5))
            .style("font-size", "9px")
            .style("color", "var(--subtle)");
          g.append("g")
            .attr("class", "axis")
            .call(d3.axisLeft(yS).ticks(4))
            .style("font-size", "9px")
            .style("color", "var(--subtle)");

          if (scenario === "basic") {
            g.append("path")
              .datum(_graphData)
              .attr("fill", "none")
              .attr("stroke", "var(--plain-base)")
              .attr("stroke-width", 2)
              .attr(
                "d",
                d3
                  .line()
                  .x((d) => xS(d.step))
                  .y((d) => yS(d.plain)),
              );
          } else {
            g.append("path")
              .datum(_graphData)
              .attr("fill", "none")
              .attr("stroke", "var(--false-base)")
              .attr("stroke-width", 2.5)
              .attr(
                "d",
                d3
                  .line()
                  .x((d) => xS(d.step))
                  .y((d) => yS(d.false)),
              );
            g.append("path")
              .datum(_graphData)
              .attr("fill", "none")
              .attr("stroke", "var(--true-base)")
              .attr("stroke-width", 2.5)
              .attr(
                "d",
                d3
                  .line()
                  .x((d) => xS(d.step))
                  .y((d) => yS(d.true)),
              );
          }
        }

        /**
         * @param { number } n
         * @param { number } m
         * @param { () => number } random
         * @returns { Link<number> }
         */
        function generateBA(n, m, random) {
          const mClamped = Math.min(m, n - 1);
          /** @type { Node[] } */
          const nodes = d3.range(n).map(newNode);
          /** @type { Link[] } */
          const tempLinks = [];

          /**
           *  @param { number } a
           *  @param { number } b
           */
          const addLink = (a, b) => {
            if (a === b) return;
            if (nodes[a].outNeighbors.has(b)) {
              return;
            }
            tempLinks.push({ source: a, target: b });
            nodes[a].outNeighbors.add(b);
            nodes[b].inNeighbors.add(a);
          };

          const initSize = Math.min(mClamped + 1, n);
          for (let i = 0; i < initSize; i++) {
            for (let j = i + 1; j < initSize; j++) {
              addLink(i, j);
            }
          }

          for (let i = initSize; i < n; i++) {
            const targets = new Set();
            let attempts = 0;
            while (
              targets.size < Math.min(mClamped, i) &&
              attempts < mClamped * 20
            ) {
              attempts++;
              let r = random() * (tempLinks.length * 2 || 1),
                cumul = 0;
              for (let j = 0; j < i; j++) {
                cumul += nodes[j].degree;
                if (r <= cumul && !targets.has(j)) {
                  targets.add(j);
                  break;
                }
              }
            }
            targets.forEach((t) => addLink(t, i));
          }
          _nodes = nodes;
          _sortedNodes = [..._nodes].sort((a, b) => b.degree - a.degree);
          return tempLinks;
        }

        /**
         * @typedef {Object} ContextMenu
         * @property {Node} node
         * @property {number} x
         * @property {number} y
         * @property {string} title
         * @property {{kind: Info, label: string}[]} sources
         */

        /**
         * @param {number} x
         * @param {number} y
         * @param {Node} node
         * @param {Scenario} scenario
         * @returns {ContextMenu}
         */
        function newContextMenu(x, y, node, scenario) {
          const menuW = 175;
          const menuH = 240;
          if (x + menuW > window.innerWidth) x -= menuW;
          if (y + menuH > window.innerHeight) y -= menuH;

          const speedLabel = SPEED_LABELS[node.speedIndex];
          const nodeType = node.isInfluencer
            ? "👑 インフルエンサー"
            : "ユーザー";
          const title = `${nodeType} ID:${node.id} ${speedLabel}`;
          const sources = INFOS_BY_SOURCE[scenario].map(
            (/** @type {Info} */ kind) => {
              const prop = SOURCE_PROPS[kind];
              const msg = node.source === kind ? "を解除" : "に設定";
              return {
                kind,
                label: `${prop.icon} ${prop.name}${msg}`,
              };
            },
          );
          return {
            x,
            y,
            title,
            sources,
            node,
          };
        }

        // D3オブジェクト
        let _simulation = null;
        let _nodeSelection = null;
        let _linkSelection = null;
        let _labelSelection = null;

        /**
         * @param {Node} node
         */
        function _nodeRadius(node) {
          // const base = this.userCount > 200 ? 4.5 : 8;
          const base = 8;
          return node.isInfluencer ? base * 1.8 : base;
        }

        /**
         * @param {Node} node
         */
        function _nodeClass(node) {
          const classes = ["node"];
          if (node.isInfluencer) classes.push("influencer");
          if (node.source != null) classes.push(`source-${node.source}`);
          if (node.isHighlighted) classes.push("highlighted");
          return classes.join(" ");
        }

        /**
         * @param {Node} node
         * @param {Record<Info, { colors: string[] }>} sourceData
         */
        function _nodeColor(node, sourceData) {
          if (node.adoption.kind === "vacuous") {
            return COLORS.vacuous.raw;
          }
          return sourceData[node.adoption.info].colors[node.adoption.sourceId];
        }

        /**
         * @param {Node} node
         */
        function _pulseNode(node) {
          const r = _nodeRadius(node);
          _nodeSelection
            ?.filter((d) => d.id === node.id)
            ?.transition()
            ?.duration(80)
            ?.attr("r", r * 1.9)
            ?.transition()
            ?.duration(100)
            ?.attr("r", r);
        }

        /**
         * @param {Link<Node>} link
         * @param {Record<Info, { colors: string[] }>} sourceData
         * @returns {string}
         */
        function _linkStyle(link, sourceData) {
          const a = activeLinkMap.get(link.source.id, link.target.id);
          let stroke, width, opacity;
          if (!a) {
            stroke = COLORS.vacuous.raw;
            width = 1;
            opacity = 0.25;
          } else {
            stroke = sourceData[a.info].colors[a.sourceId];
            width = 2;
            opacity = 0.5;
          }
          return `stroke:${stroke};stroke-width:${width};stroke-opacity:${opacity}`;
        }

        /**
         * @param {boolean} isShow
         */
        function drawSpeedIcons(isShow) {
          if (isShow) {
            _labelSelection
              ?.text((d) => SPEED_PATTERNS[d.speedIndex].arrow)
              ?.style("fill", (d) => SPEED_PATTERNS[d.speedIndex].color)
              ?.attr("dy", (d) => -(_nodeRadius(d) + 3));
          } else {
            _labelSelection?.text((d) => "");
          }
        }
        /**
         * @param {{
         * showSpeedIcons: boolean
         * sourceData: Record<Info, { colors: string[] }>
         * }} comp
         */
        function _updateVisuals(comp) {
          _nodeSelection
            ?.attr("class", (d) => _nodeClass(d))
            ?.attr("r", (d) => _nodeRadius(d))
            ?.attr("fill", (d) => _nodeColor(d, comp.sourceData));
          _linkSelection
            // .attr("class", (d) => this._linkClass(d))
            ?.attr("style", (d) => _linkStyle(d, comp.sourceData));
          drawSpeedIcons(comp.showSpeedIcons);
        }

        // _isInfluencerLink(d) {
        //   const s = typeof d.source === "object" ? d.source.id : d.source;
        //   const t = typeof d.target === "object" ? d.target.id : d.target;
        //   const sN = _nodes[s];
        //   const tN = _nodes[t];
        //   return sN.isInfluencer || tN.isInfluencer;
        // },

        // Alpine コンポーネント定義
        function simulator() {
          let _startTime = 0;
          let _time50 = null;
          let _time90 = null;
          let _seed = 42;
          let _stepRequested = false;

          return {
            // ===== Alpine リアクティブ状態（UI表示に関わるもの） =====
            /**
             * @type {Scenario}
             */
            scenario: "basic",
            userCount: 100,
            mParam: 1,
            influencerCount: 2,

            speedSlider: 100,
            speedMultiplier: 1.0,
            showSpeedIcons: true,
            /**
             * @type { "none" | "running" | "paused" | "finished" }
             */
            runStatus: "none",
            panelMinimized: false,
            // UI表示用まとめオブジェクト（統計・バランスメータ）
            ui: {
              reached: "0%",
              falseCount: "0人",
              trueCount: "0人",
              time50: "--",
              time90: "--",
              done: "--",
              barFalsePct: 0,
              barIdlePct: 100,
              barTruePct: 0,
            },

            /**
             * @type {ContextMenu | null}
             */
            contextMenu: null,

            /**
             * @type {{kind: Scenario; label: string}[]}
             */
            get scenarioTabs() {
              return [
                { kind: "basic", label: SCENARIO_TAB.basic },
                { kind: "correction", label: SCENARIO_TAB.correction },
              ];
            },

            sliders() {
              if (this.scenario === "basic") {
                return [basicInfoSlider];
              } else {
                return [
                  misInfoSlider,
                  trueInfoSlider,
                  trueInfoDelaySlider,
